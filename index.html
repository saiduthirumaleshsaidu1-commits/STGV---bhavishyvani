<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV: భవిష్యవాణి - HD కాస్మిక్ ఎక్స్‌పీరియన్స్</title>
    <style>
        :root {
            --space-bg: #000205;
            --neon-blue: #00d2ff;
            --sun-main: #ff8c00;
            --sun-glow: #ff4500;
        }

        body {
            margin: 0;
            background-color: var(--space-bg);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            text-align: center;
            height: 100vh;
        }

        /* HD నక్షత్రాల బ్యాక్‌గ్రౌండ్ */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            z-index: -2;
            opacity: 0.5;
        }

        /* తోకచుక్క (Comet) యానిమేషన్ */
        .comet {
            position: absolute;
            width: 3px; height: 3px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px 2px #fff, -10px 0 20px 5px rgba(255,255,255,0.5);
            opacity: 0;
            animation: comet-move 15s linear infinite;
        }

        @keyframes comet-move {
            0% { transform: translateX(-100px) translateY(100px) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(120vw) translateY(-20vh) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* శాటిలైట్ యానిమేషన్ */
        .satellite {
            position: absolute;
            width: 15px; height: 8px;
            background: #444;
            border-radius: 2px;
            box-shadow: 0 0 5px var(--neon-blue);
            animation: sat-move 40s linear infinite;
            opacity: 0.7;
        }

        @keyframes sat-move {
            from { left: -100px; top: 15%; }
            to { left: 110%; top: 25%; }
        }

        h1 {
            font-size: 2.2rem;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* విశ్వ వ్యవస్థ */
        .universe-container {
            position: relative;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* HD సూర్యుడు */
        .sun {
            width: 130px; height: 130px;
            background: radial-gradient(circle, #fff700 10%, #ff8c00 40%, #ff4500 100%);
            border-radius: 50%;
            box-shadow: 0 0 80px #ff4500, inset 0 0 30px #ff0000;
            cursor: pointer;
            z-index: 10;
            transition: 0.5s;
        }

        .sun:hover { transform: scale(1.1); box-shadow: 0 0 120px #ff4500; }

        /* భూమి కక్ష్య (చాలా నెమ్మదిగా) */
        .orbit-earth {
            position: absolute;
            width: 500px; height: 500px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: rotate 80s linear infinite; 
        }

        /* HD భూమి */
        .earth {
            width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #4ea8de, #001d3d);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: -30px;
            box-shadow: 0 0 30px #2b65ec, inset -5px -5px 15px rgba(0,0,0,0.8);
            cursor: pointer;
        }

        /* చంద్రుని కక్ష్య */
        .orbit-moon {
            position: absolute;
            width: 130px; height: 130px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -35px; left: -35px;
            animation: rotate 20s linear infinite;
        }

        /* HD చంద్రుడు */
        .moon {
            width: 22px; height: 22px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #888888);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: -11px;
            box-shadow: 0 0 15px white;
            cursor: pointer;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ఇన్సైట్ బాక్స్ */
        .insight-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 10, 20, 0.85);
            border: 2px solid var(--neon-blue);
            padding: 20px;
            width: 85%; max-width: 550px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        #insight-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
            color: #e0e0e0;
        }

    </style>
</head>
<body onclick="initAudio()">

    <div class="stars-container"></div>
    <div class="comet" style="top: 15%; animation-delay: 1s;"></div>
    <div class="comet" style="top: 60%; animation-delay: 8s;"></div>
    <div class="satellite"></div>

    <h1>ఎస్ టి జి వి: భవిష్యవాణి</h1>

    <div class="universe-container">
        <div class="sun" onclick="speak('sun')"></div>
        
        <div class="orbit-earth">
            <div class="earth" onclick="speak('earth')">
                <div class="orbit-moon" onclick="event.stopPropagation(); speak('moon')">
                    <div class="moon"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="insight-box">
        <p id="insight-text">విశ్వ గమనాన్ని గమనించండి... గ్రహాన్ని స్పర్శించి భవిష్యత్తును వినండి.</p>
    </div>

    <script>
        let synth = window.speechSynthesis;

        function initAudio() { 
            // బ్రౌజర్ ఆడియోను అనుమతించడానికి చిన్న ట్రిక్
            console.log("కాస్మిక్ ఆడియో ప్రారంభమైంది..."); 
        }

        function speak(target) {
            let display = "";
            let speechText = "";

            if (target === 'sun') {
                display = "సూర్యుడు: మీ ఆత్మ శక్తికి మూలం. సంకల్పంతో ముందడుగు వేయండి.";
                speechText = "నేను కాలానికి సాక్షిని. నీలోని అజ్ఞానాన్ని దహించి, జ్ఞానాన్ని ప్రసాదించే అగ్నిని నేను!";
            } else if (target === 'earth') {
                display = "భూమి: కర్మభూమిపై మీ బాధ్యతను గుర్తించండి. ప్రకృతిని ప్రేమించండి.";
                speechText = "నీవు నా గర్భం నుండి పుట్టావు, నాలోనే కలుస్తావు. మధ్యలో ఉన్న ఈ కాలంలో ధర్మబద్ధంగా జీవించు.";
            } else if (target === 'moon') {
                display = "చంద్రుడు: మనస్సును ప్రశాంతంగా ఉంచుకోండి. భావోద్వేగాలను నియంత్రించండి.";
                speechText = "నీ మనసులోని అలజడి నాకు తెలుసు. సముద్రపు పొంగును తగ్గించే నా శాంతి, నీ ఆవేశాన్ని కూడా చల్లబరుస్తుంది. ప్రశాంతంగా ఉండు.";
            }

            document.getElementById('insight-text').innerText = display;

            // HD వాయిస్ సెట్టింగ్స్
            let utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = 'te-IN';
            utterance.pitch = 0.4; // గంభీరమైన బాస్ (Deep Bass)
            utterance.rate = 0.75; // నెమ్మదిగా, స్పష్టంగా
            
            synth.cancel(); 
            synth.speak(utterance);
        }

        // రియల్ టైమ్ డేటా సిమ్యులేషన్ (ప్రతి 15 సెకన్లకు)
        setInterval(() => {
            const updates = [
                "ప్రస్తుతం సౌర గాలుల ప్రభావం సానుకూలంగా ఉంది.",
                "చంద్రుని ఆకర్షణ వల్ల ఆలోచనలు వేగవంతం అవుతున్నాయి.",
                "భూమి తన అక్షంపై స్థిరంగా భ్రమిస్తోంది. మీ పనులపై శ్రద్ధ పెట్టండి."
            ];
            console.log("కాస్మిక్ అప్‌డేట్: " + updates[Math.floor(Math.random() * updates.length)]);
        }, 15000);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>విశ్వనేత్ర AI - STGV</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/190/190411.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd/dist/coco-ssd.min.js"></script>
    
    <style>
        :root { --gold: #FFD700; --neon: #00ffcc; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: var(--gold); font-family: sans-serif; margin: 0; text-align: center; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid var(--gold); background: #111; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .vision-box { position: relative; width: 100vw; height: 100vh; background: #000; padding-top: 80px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 80px; left: 0; width: 100%; height: 100%; }
        #status { font-size: 0.9rem; color: var(--neon); font-weight: bold; margin-top: 5px; }
        .btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; border: none; padding: 20px 0; font-size: 1.3rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 85%; box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4); z-index: 1000; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">విశ్వనేత్ర AI</h2>
    <div id="status">AI లోడ్ అవుతోంది...</div>
</div>

<div class="vision-box">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<button class="btn" onclick="startCamera()">విజన్ ప్రారంభించండి</button>

<script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => console.log('SW Registered'));
        });
    }

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d');
    let model;
    let lastSpoken = "";

    const teluguNames = {
        "person": "మనిషి", "bicycle": "సైకిల్", "car": "కారు", "motorcycle": "బైక్",
        "dog": "కుక్క", "chair": "కుర్చీ", "potted plant": "మొక్క", "dining table": "టేబుల్",
        "cell phone": "ఫోన్", "laptop": "లాప్‌టాప్", "bottle": "బాటిల్", "tv": "టీవీ",
        "backpack": "బ్యాగు", "umbrella": "గొడుగు", "book": "పుస్తకం", "clock": "గడియారం"
    };

    async function initAI() {
        try {
            model = await cocoSsd.load(); 
            status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది!";
            speak("విశ్వనేత్ర ఏఐకి స్వాగతం. విజన్ ప్రారంభించడానికి కింద ఉన్న బటన్ నొక్కండి.");
        } catch (err) { status.innerText = "Internet Check చేయండి."; }
    }
    window.onload = initAI;

    async function startCamera() {
        if (!model) return;
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            detect();
        };
    }

    async function detect() {
        const predictions = await model.detect(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        predictions.sort((a, b) => b.bbox[2] - a.bbox[2]); 

        predictions.forEach(p => {
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 4;
            ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
            
            let telName = teluguNames[p.class] || p.class;
            let xPos = p.bbox[0];
            let locVal = (xPos < canvas.width / 3) ? "ఎడమ వైపున " : (xPos > (canvas.width/3)*2) ? "కుడి వైపున " : "మీ ముందు ";
            
            let isClose = (p.bbox[2] > canvas.width * 0.45);
            if (!window.speechSynthesis.speaking && lastSpoken !== (locVal + telName)) {
                let msg = isClose ? "జాగ్రత్త! " + locVal + telName + " చాలా దగ్గరగా ఉంది." : locVal + telName + " ఉంది.";
                if(isClose && navigator.vibrate) navigator.vibrate(200);
                speak(msg);
                lastSpoken = (locVal + telName);
            }
        });
        requestAnimationFrame(detect);
    }

    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'te-IN';
        window.speechSynthesis.speak(u);
    }
</script>
    <a href="about.html">నా గురించి</a>
</body>
</html>

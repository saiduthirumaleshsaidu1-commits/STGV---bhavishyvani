<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV విశ్వనేత్ర AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; }
        .header { background: #111; padding: 15px; color: #00ffcc; font-size: 22px; font-weight: bold; border-bottom: 2px solid #00ffcc; }
        video { width: 95%; max-width: 400px; border: 2px solid #444; border-radius: 10px; margin-top: 15px; }
        .status { background: #222; margin: 15px; padding: 15px; color: #FFD700; font-size: 18px; border-radius: 8px; min-height: 40px; }
        .btn { padding: 20px; font-size: 18px; width: 90%; margin: 10px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ai { background: #FFD700; color: #000; }
        .footer { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">STGV విశ్వనేత్ర AI</div>
<div class="status" id="status">కెమెరా లోడ్ అవుతోంది...</div>
<video id="webcam" autoplay playsinline muted></video>

<button class="btn btn-ai" onclick="startAI()">మొత్తం వివరించు (మనిషిలా)</button>

<div class="footer">తయారు చేసినవారు: సైదు తిరుమలేష్</div>

<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');

    // కెమెరా ప్రారంభం
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది.";
            speak("విశ్వనేత్ర సిద్ధంగా ఉంది.");
        } catch (e) {
            status.innerText = "కెమెరా అనుమతి ఇవ్వండి.";
        }
    }

    // మనిషిలా వివరించే ఫీచర్ - సురక్షితమైన పద్ధతి
    async function startAI() {
        // కీని నేరుగా కోడ్ లో పెట్టకుండా ఇలా అడుగుతాం - దీనివల్ల గూగుల్ బ్లాక్ చేయదు
        let API_KEY = prompt("దయచేసి మీ Gemini API Key ని ఇక్కడ పేస్ట్ చేయండి:");

        if (!API_KEY || !API_KEY.startsWith("AIza")) {
            alert("సరైన API కీ ని నమోదు చేయండి. అది AIza తో మొదలవ్వాలి.");
            return;
        }

        status.innerText = "పరిశీలిస్తున్నాను... ఒక్క నిమిషం.";
        speak("పరిశీలిస్తున్నాను, ఒక్క నిమిషం వేచి ఉండండి.");

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "ఈ ఫోటోలో ఏముందో తెలుగులో మనిషిలా చాలా వివరంగా వివరించు." },
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]}]
                })
            });
            const data = await res.json();
            
            if (data.error) {
                status.innerText = "కీ పని చేయడం లేదు. గూగుల్ దీన్ని బ్లాక్ చేసి ఉండవచ్చు.";
                speak("కీ సమస్య ఉంది.");
                return;
            }

            const resultText = data.candidates[0].content.parts[0].text;
            status.innerText = resultText;
            speak(resultText);
        } catch (err) {
            status.innerText = "ఇంటర్నెట్ కనెక్షన్ చెక్ చేయండి.";
            speak("నెట్‌వర్క్ సమస్య ఉంది.");
        }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'te-IN';
        window.speechSynthesis.speak(msg);
    }

    window.onload = init;
</script>
</body>
</html>

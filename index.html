<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - True AGI Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        :root { --neon: #00d2ff; --space: #00050a; }
        body { margin: 0; background: var(--space); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .page { position: absolute; width: 100%; height: 100%; transition: 1s; display: flex; flex-direction: column; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        
        /* Camera UI */
        #v-wrap { position: relative; flex: 1; border: 2px solid var(--neon); margin: 10px; border-radius: 20px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-bar { padding: 20px; text-align: center; background: rgba(0,0,0,0.8); font-weight: bold; }

        /* Future Page - Deep Cosmic */
        #future-page { background: radial-gradient(circle at center, #001a33, #000); align-items: center; justify-content: center; text-align: center; }
        .sun { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #fff, #ff4500, #900); box-shadow: 0 0 100px #ff4500; cursor: pointer; animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .prediction-box { width: 85%; margin-top: 30px; padding: 25px; border: 1px solid var(--neon); border-radius: 20px; background: rgba(0,210,255,0.05); backdrop-filter: blur(10px); min-height: 150px; }
        .btn { border: 2px solid var(--neon); color: var(--neon); padding: 12px 30px; border-radius: 30px; background: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body onclick="init()">

    <div id="p1" class="page">
        <div class="status-bar" id="info">స్క్రీన్ తాకి AI ప్రారంభించండి</div>
        <div id="v-wrap"><video id="webcam" autoplay playsinline muted></video></div>
        <div class="status-bar"><button class="btn" onclick="toP2()">నేరుగా భవిష్యవాణికి</button></div>
    </div>

    <div id="p2" class="page hidden">
        <h1 style="color:var(--neon); letter-spacing: 2px;">STGV భవిష్యవాణి</h1>
        <div class="sun" onclick="getRealFuture()"></div>
        <div class="prediction-box">
            <div id="date-info" style="color:var(--neon); font-size: 0.9em; margin-bottom: 10px;"></div>
            <div id="future-text" style="font-size: 1.2em; line-height: 1.6;">సూర్యుడిని తాకి నేటి కాలజ్ఞానం విను...</div>
        </div>
        <button class="btn" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>

    <script>
        let model, video, synth = window.speechSynthesis, active = false;

        async function init() {
            if(active) return; active = true;
            video = document.getElementById('webcam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                document.getElementById('info').innerText = "AI లోడ్ అవుతోంది...";
                model = await mobilenet.load();
                document.getElementById('info').innerText = "విశ్వ నేత్ర సిద్ధం";
                speak("విశ్వ నేత్ర సిద్ధం. దారిని గమనిస్తున్నాను.");
                loop();
            } catch(e) { alert("కెమెరా అనుమతి ఇవ్వండి"); }
        }

        async function loop() {
            if(!document.getElementById('p2').classList.contains('hidden')) return;
            const res = await model.classify(video);
            if(res.length > 0) {
                let item = res[0].className.toLowerCase();
                let prob = res[0].probability;

                // కేవలం వస్తువు సరిగ్గా గుర్తిస్తేనే (High Probability) దారి చెప్పాలి
                if(prob > 0.45) {
                    document.getElementById('info').innerText = "గుర్తించాను: " + item;
                    if(item.includes('wall') || item.includes('door')) speak("ముందు అడ్డంకి ఉంది, ఆగు.");
                    else speak("దారి బాగుంది, సాగు.");
                } 
                // గుర్తుపట్టలేకపోతే (అడ్డంకిగా భావించినప్పుడు) కాలజ్ఞానం
                else if(prob < 0.15) {
                    speak("ఈ వస్తువు రహస్యం నాకు తెలియదు. కాలజ్ఞానంలో విశ్లేషిద్దాం.", true);
                    setTimeout(toP2, 5000); return;
                }
            }
            setTimeout(loop, 4000);
        }

        function toP2() { 
            document.getElementById('p1').classList.add('hidden'); 
            document.getElementById('p2').classList.remove('hidden');
            document.getElementById('date-info').innerText = "తేదీ: " + new Date().toLocaleDateString('te-IN');
            speak("భవిష్యవాణిలోకి స్వాగతం. నేటి కాలచక్రాన్ని వివరిస్తాను.", true);
        }

        function getRealFuture() {
            // భవిష్యత్తును వివరించే డేటా (Logic based on Time/Randomness)
            const predictions = [
                "నేడు నీ నక్షత్ర బలం బాగుంది. కొత్త పనులు ప్రారంభించడానికి ఇది శుభ సమయం.",
                "రాబోయే మూడు గంటల్లో నీకు ఒక శుభవార్త అందుతుంది. ఓపిక పట్టండి.",
                "నీ సంకల్పం దృఢంగా ఉంది, కానీ నిర్ణయాలు తీసుకునేటప్పుడు ఒకటికి రెండుసార్లు ఆలోచించు.",
                "కాల చక్రం నీ వైపు తిరుగుతోంది. శ్రమ నీది, ఫలితం విశ్వానిది.",
                "ఈరోజు సాయంత్రం లోపు నీవు అనుకున్న ఒక చిన్న కోరిక నెరవేరుతుంది."
            ];
            let pick = predictions[Math.floor(Math.random() * predictions.length)];
            document.getElementById('future-text').innerText = pick;
            speak(pick, true);
        }

        function speak(txt, grave=false) {
            let u = new SpeechSynthesisUtterance(txt); u.lang = 'te-IN';
            u.pitch = grave ? 0.3 : 0.9; u.rate = 0.8;
            synth.cancel(); synth.speak(u);
        }
    </script>
</body>
</html>

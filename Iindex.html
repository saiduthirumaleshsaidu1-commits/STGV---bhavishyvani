<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV విశ్వనేత్ర AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; padding: 0; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid #00ffcc; color: #00ffcc; font-weight: bold; font-size: 20px; }
        #video-container { position: relative; width: 90%; max-width: 400px; margin: 15px auto; border: 2px solid #333; border-radius: 15px; overflow: hidden; }
        video { width: 100%; display: block; }
        .status-box { background: #222; margin: 10px; padding: 15px; border-radius: 10px; font-size: 18px; color: #FFD700; min-height: 40px; border: 1px solid #444; }
        .controls { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 15px; }
        button { padding: 18px; font-size: 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-detect { background-color: #00ffcc; color: #000; }
        .btn-describe { background-color: #FFD700; color: #000; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2); }
        .footer { font-size: 12px; color: #555; margin-top: 10px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">STGV విశ్వనేత్ర AI</div>

<div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div id="status" class="status-box">లోడ్ అవుతోంది... కెమెరా అనుమతి ఇవ్వండి.</div>

<div class="controls">
    <button class="btn-detect" id="detectBtn" onclick="toggleDetection()">వస్తువులు వెతుకు (On/Off)</button>
    <button class="btn-describe" onclick="askAndDescribe()">మొత్తం వివరించు (మనిషిలా)</button>
</div>

<div class="footer">ప్రోగ్రామింగ్: సైదు తిరుమలేష్ | STGV భవిష్యవాణి</div>

<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const detectBtn = document.getElementById('detectBtn');
    
    let model;
    let isDetecting = false;
    let lastSpoken = "";

    // 1. కెమెరా సెటప్
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 320, height: 240 } 
            });
            video.srcObject = stream;
            status.innerText = "AI మోడల్ సిద్ధం అవుతోంది...";
            model = await cocoSsd.load({ base: 'mobilenet_v2' });
            status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది.";
            speak("విశ్వనేత్ర సిద్ధంగా ఉంది.");
        } catch (err) {
            status.innerText = "కెమెరా ఓపెన్ కాలేదు. పర్మిషన్ ఇవ్వండి.";
        }
    }

    // 2. వస్తువులు & గోడల గుర్తింపు (Real-time)
    async function detect() {
        if (!isDetecting) return;
        const predictions = await model.detect(video);
        
        let found = "";
        const teluguItems = { "person": "మనిషి", "chair": "కుర్చీ", "mobile phone": "ఫోన్", "bottle": "బాటిల్", "wall": "గోడ", "door": "తలుపు" };

        predictions.forEach(p => {
            if (p.score > 0.6) {
                found = teluguItems[p.class.toLowerCase()] || p.class;
            }
        });

        if (found && found !== lastSpoken) {
            status.innerText = "ముందు " + found + " ఉంది.";
            speak("ముందు " + found + " ఉంది.");
            lastSpoken = found;
        }
        setTimeout(() => requestAnimationFrame(detect), 400); // ఫోన్ వేడెక్కకుండా గ్యాప్
    }

    function toggleDetection() {
        isDetecting = !isDetecting;
        detectBtn.style.backgroundColor = isDetecting ? "#ff4444" : "#00ffcc";
        detectBtn.innerText = isDetecting ? "ఆపు (Stop)" : "వస్తువులు వెతుకు";
        if (isDetecting) detect();
    }

    // 3. సురక్షితమైన పద్ధతిలో మనిషిలా వివరించే ఫీచర్
    async function askAndDescribe() {
        // ఇక్కడ మనం కీని అడుగుతాం - దీనివల్ల గూగుల్ కీని బ్లాక్ చేయదు
        let API_KEY = prompt("దయచేసి మీ కొత్త Gemini API Key ని పేస్ట్ చేయండి:");

        if (!API_KEY || !API_KEY.startsWith("AIza")) {
            alert("సరైన API కీ ని నమోదు చేయండి.");
            return;
        }

        status.innerText = "పరిశీలిస్తున్నాను... ఒక్క నిమిషం.";
        speak("పరిశీలిస్తున్నాను, ఒక్క నిమిషం వేచి ఉండండి.");

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "నువ్వు అంధుడికి సహాయం చేసే మిత్రుడివి. ఈ ఫోటోలో ఏముందో తెలుగులో మనిషిలా చాలా వివరంగా వివరించు." },
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]}]
                })
            });
            const data = await res.json();
            
            if (data.error) {
                status.innerText = "కీ పని చేయడం లేదు. కొత్త కీ తీసుకోండి.";
                speak("ఏపీఐ కీ సమస్య ఉంది.");
                return;
            }

            const description = data.candidates[0].content.parts[0].text;
            status.innerText = description;
            speak(description);
        } catch (e) {
            status.innerText = "నెట్‌వర్క్ సమస్య. ఇంటర్నెట్ చెక్ చేయండి.";
            speak("నెట్‌వర్క్ సమస్య ఉంది.");
        }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'te-IN';
        window.speechSynthesis.speak(msg);
    }

    window.onload = setupCamera;
</script>
</body>
</html>

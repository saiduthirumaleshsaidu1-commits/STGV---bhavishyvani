<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - విశ్వ నేత్ర & భవిష్యవాణి</title>
    <style>
        :root {
            --bg-color: #000308;
            --neon-blue: #00d2ff;
            --accent-green: #39ff14;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* అంధుల కోసం టచ్ ఏరియా */
        .vishwa-netra-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #222;
        }

        .instruction-bar {
            background: rgba(0, 210, 255, 0.1);
            padding: 15px;
            font-weight: bold;
            color: var(--neon-blue);
            font-size: 1.2em;
        }

        .touch-grid {
            display: flex;
            flex: 1;
        }

        .grid-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #111;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 1.5em;
            font-weight: bold;
        }

        .grid-box:active { background: rgba(0, 210, 255, 0.2); }

        /* భవిష్యవాణి ఎంట్రీ బటన్ */
        .bhavishyvani-entry {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to top, #000, #05101a);
        }

        .nav-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* డెకరేషన్ */
        .label { opacity: 0.3; font-size: 0.8em; pointer-events: none; }
    </style>
</head>
<body onclick="initApp()">

    <div class="vishwa-netra-container">
        <div class="instruction-bar" id="status-bar">
            STGV విశ్వ నేత్ర: స్క్రీన్ తాకి వస్తువులను గుర్తించండి
        </div>
        
        <div class="touch-grid">
            <div class="grid-box" 
                 onmouseover="announce('ఎడమ వైపు: దారి ఖాళీగా ఉంది')" 
                 onclick="announce('ఎడమ వైపు దారి ఖాళీగా ఉంది. ముందుకు సాగండి')">
                <span class="label">LEFT</span>
            </div>
            
            <div class="grid-box" 
                 style="border-left: 2px solid #222; border-right: 2px solid #222;"
                 onmouseover="announce('మధ్యలో: గుర్తు తెలియని వస్తువు ఉంది')" 
                 onclick="handleUnknown()">
                <span class="label">CENTER</span>
            </div>
            
            <div class="grid-box" 
                 onmouseover="announce('కుడి వైపు: గోడ ఉంది')" 
                 onclick="announce('కుడి వైపు గోడ ఉంది. ఎడమ వైపునకు వెళ్ళండి')">
                <span class="label">RIGHT</span>
            </div>
        </div>
    </div>

    <div class="bhavishyvani-entry">
        <button class="nav-btn" onclick="goToBhavishyvani()">భవిష్యవాణి లోకి వెళ్ళండి</button>
    </div>

    <script>
        let synth = window.speechSynthesis;
        let isStarted = false;

        function initApp() {
            if(!isStarted) {
                announce("STGV కి స్వాగతం. పై భాగం అందుల కోసం వస్తువులను గుర్తిస్తుంది. క్రింది భాగం భవిష్యవాణి కాలజ్ఞానం కోసం.");
                isStarted = true;
            }
        }

        function announce(msg) {
            document.getElementById('status-bar').innerText = msg;
            let utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'te-IN';
            utterance.pitch = 1;
            utterance.rate = 0.9;
            synth.cancel();
            synth.speak(utterance);
        }

        function handleUnknown() {
            announce("మధ్యలో ఉన్న వస్తువును నేను గుర్తించలేకపోతున్నాను. దీని రహస్యం తెలుసుకోవడానికి భవిష్యవాణికి వెళ్దాం. సిద్ధంగా ఉండండి.");
            setTimeout(() => {
                goToBhavishyvani();
            }, 4000);
        }

        function goToBhavishyvani() {
            // మీ భవిష్యవాణి పేజీ లింక్ ఇక్కడ ఇవ్వండి
            window.location.href = "https://saiduthirumaleshsaidu1-commits.github.io/STGV---bhavishyvani/";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV Pro - విశ్వ నేత్ర & కాలజ్ఞానం</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00d2ff; --warn: #ff4500; --space: #00050a; }
        body { margin: 0; background: var(--space); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .page { position: absolute; width: 100%; height: 100%; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        
        /* విశ్వ నేత్ర UI */
        .header { padding: 15px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon); box-shadow: 0 4px 15px rgba(0,210,255,0.3); }
        #v-wrap { position: relative; flex: 1; border: 2px solid var(--neon); margin: 12px; border-radius: 25px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* డైనమిక్ ఇండికేటర్స్ */
        .scanner-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon); animation: scan 3s linear infinite; box-shadow: 0 0 15px var(--neon); }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* భవిష్యవాణి UI */
        #p2 { background: radial-gradient(circle at center, #001a33 0%, #000 100%); align-items: center; justify-content: center; text-align: center; }
        .sun-hd { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, #fff, #ffcc00, #ff4500, #900); box-shadow: 0 0 100px #ff4500; cursor: pointer; animation: glow 4s infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 60px #ff4500; transform: scale(1); } 50% { box-shadow: 0 0 120px #ffcc00; transform: scale(1.05); } }
        
        .card { width: 85%; margin-top: 30px; padding: 25px; border: 1px solid var(--neon); border-radius: 25px; background: rgba(0,210,255,0.05); backdrop-filter: blur(10px); min-height: 160px; }
        .btn { border: 2px solid var(--neon); color: var(--neon); padding: 12px 35px; border-radius: 30px; background: none; cursor: pointer; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: black; }
    </style>
</head>
<body onclick="initApp()">

    <div id="p1" class="page">
        <div class="header">
            <h2 style="margin:0; color:var(--neon); text-shadow: 0 0 10px var(--neon);">STGV విశ్వ నేత్ర Pro</h2>
            <div id="ai-status" style="font-size: 0.8em;">తాకి ప్రారంభించండి</div>
        </div>
        <div id="v-wrap">
            <video id="cam" autoplay playsinline muted></video>
            <div class="scanner-line"></div>
        </div>
        <div class="header" style="border-top: 2px solid var(--neon); border-bottom: none;">
            <div id="obj-label" style="color:var(--neon); font-weight: bold; margin-bottom: 10px;">గమనిస్తున్నాను...</div>
            <button class="btn" onclick="toFuture()">నేరుగా భవిష్యవాణి</button>
        </div>
    </div>

    <div id="p2" class="page hidden">
        <h1 style="color:var(--neon); text-shadow: 0 0 20px var(--neon);">STGV భవిష్యవాణి</h1>
        <div class="sun-hd" onclick="getFuture()"></div>
        <div class="card">
            <div id="f-msg" style="font-size: 1.2em; line-height: 1.8;">సూర్యుడిని తాకి నేటి కాలజ్ఞానం విను...</div>
        </div>
        <button class="btn" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>

    <script>
        let model, video, synth = window.speechSynthesis, active = false;

        async function initApp() {
            if(active) return; active = true;
            video = document.getElementById('cam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                document.getElementById('ai-status').innerText = "ప్రో ఇంజిన్ లోడ్ అవుతోంది...";
                model = await cocoSsd.load();
                document.getElementById('ai-status').innerText = "విశ్వ నేత్ర సిద్ధం";
                speak("విశ్వ నేత్ర ప్రో సిద్ధం. దూరం మరియు దిశలను గమనిస్తున్నాను.");
                process();
            } catch(e) { alert("కెమెరా పర్మిషన్ ఇవ్వండి"); }
        }

        async function process() {
            if(!document.getElementById('p2').classList.contains('hidden')) return;
            const res = await model.detect(video);
            
            if(res.length > 0) {
                // అత్యంత ఖచ్చితత్వం ఉన్న మొదటి వస్తువు
                let itm = res[0];
                let name = itm.class;
                let box = itm.bbox; // [x, y, width, height]
                
                // తెలుగు అనువాదం
                let tel = name;
                if(name.includes('person')) tel = "మనిషి";
                if(name.includes('chair')) tel = "కుర్చీ";
                if(name.includes('bottle')) tel = "బాటిల్";
                if(name.includes('cell phone')) tel = "ఫోన్";

                // దిశ మరియు దూరం లెక్కించడం
                let vw = video.videoWidth || 640;
                let cx = box[0] + (box[2]/2);
                let area = (box[2] * box[3]) / (vw * (video.videoHeight || 480)); // వస్తువు ఆక్రమించిన స్థలం

                let dir = "ముందు";
                if((cx/vw) < 0.35) dir = "ఎడమ వైపు";
                else if((cx/vw) > 0.65) dir = "కుడి వైపు";

                let dist = "";
                if(area > 0.45) dist = ". చాలా దగ్గరగా ఉంది, జాగ్రత్త!";
                else if(area > 0.20) dist = ". దగ్గరగా ఉంది.";

                document.getElementById('obj-label').innerText = tel + " (" + dir + ")" + dist;
                speak(tel + " " + dir + dist);

            } else {
                document.getElementById('obj-label').innerText = "ఏమీ కనిపించడం లేదు...";
            }
            setTimeout(process, 4500); 
        }

        function toFuture() { 
            document.getElementById('p1').classList.add('hidden'); 
            document.getElementById('p2').classList.remove('hidden'); 
            speak("కాల చక్రంలోకి స్వాగతం. మీ నేటి కాలాన్ని తెలుసుకోండి.", true);
        }

        function getFuture() {
            let hr = new Date().getHours();
            let timeContext = "ఈ శుభ వేళ, ";
            if(hr < 12) timeContext = "ఈ ఉదయ కాలాన, ";
            else if(hr < 17) timeContext = "ఈ మధ్యాహ్న సమయాన, ";
            else timeContext = "ఈ నిశీధి వేళ, ";

            const msgs = [
                "నీ సంకల్పం గొప్పది. నేడు నీవు చేసే ప్రయత్నం సఫలమవుతుంది.",
                "కాలం నీ వెంటే ఉంది. ఆందోళన వీడి ముందుకు సాగు, విజయం నీదే.",
                "నీ నక్షత్ర బలం బాగుంది. రాబోయే కొద్ది సేపట్లో ఒక శుభవార్త వింటావు.",
                "శ్రమ నీది, ఫలితం విశ్వానిది. ఈరోజు నీకు ఇష్టమైన వ్యక్తి నుండి సహాయం అందుతుంది.",
                "నీ లోని శక్తిని నమ్ముకో. నేడు నీవు అనుకున్న ఒక పాత కోరిక నెరవేరుతుంది."
            ];
            let msg = timeContext + msgs[Math.floor(Math.random()*msgs.length)];
            document.getElementById('f-msg').innerText = msg;
            speak(msg, true);
        }

        function speak(t, g=false) {
            let u = new SpeechSynthesisUtterance(t); u.lang = 'te-IN';
            u.pitch = g ? 0.3 : 0.9; u.rate = 0.85;
            synth.cancel(); synth.speak(u);
        }
    </script>
</body>
</html>

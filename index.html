
<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - True AI Vision & Future</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        :root { --neon: #00d2ff; --gold: #ffcc00; --deep: #00050a; }
        body { margin: 0; background: var(--deep); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .page { position: absolute; width: 100%; height: 100%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1) translateY(-20px); }
        
        /* విశ్వ నేత్ర UI */
        #v-wrap { position: relative; flex: 1; border: 2px solid var(--neon); margin: 15px; border-radius: 25px; overflow: hidden; box-shadow: 0 0 25px rgba(0,210,255,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-header { padding: 15px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon); z-index: 10; }
        
        /* భవిష్యవాణి UI */
        #p2 { background: radial-gradient(circle at center, #001a33 0%, #000 100%); align-items: center; justify-content: center; text-align: center; }
        .sun-hd { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, #fff, #ff4500, #900); box-shadow: 0 0 100px #ff4500; cursor: pointer; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        
        .prediction-card { width: 85%; margin-top: 30px; padding: 25px; border: 1px solid var(--neon); border-radius: 25px; background: rgba(0,210,255,0.1); backdrop-filter: blur(15px); min-height: 160px; display: flex; flex-direction: column; justify-content: center; }
        #future-msg { font-size: 1.2em; line-height: 1.7; color: #e0f7ff; text-shadow: 0 0 5px rgba(0,210,255,0.5); }
        .btn { border: 2px solid var(--neon); color: var(--neon); padding: 12px 35px; border-radius: 30px; background: none; cursor: pointer; font-weight: bold; margin-top: 25px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body onclick="activateSTGV()">

    <div id="p1" class="page">
        <div class="status-header">
            <h2 style="margin:0; color:var(--neon); letter-spacing: 1px;">STGV విశ్వ నేత్ర</h2>
            <div id="ai-info" style="font-size: 0.9em; margin-top: 5px;">స్క్రీన్ తాకి AI ప్రారంభించండి</div>
        </div>
        <div id="v-wrap">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        <div class="status-header" style="border-top: 2px solid var(--neon); border-bottom: none;">
            <button class="btn" onclick="manualToP2()">నేరుగా కాలజ్ఞానం</button>
        </div>
    </div>

    <div id="p2" class="page hidden">
        <h1 style="color:var(--neon); text-shadow: 0 0 20px var(--neon); margin-bottom: 10px;">STGV భవిష్యవాణి</h1>
        <div class="sun-hd" onclick="generateFuture()"></div>
        <div class="prediction-card">
            <div id="future-msg">సూర్యుడిని తాకి నీ నేటి కాలజ్ఞానం విను...</div>
        </div>
        <button class="btn" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>

    <script>
        let model, video, synth = window.speechSynthesis, isLive = false;

        async function activateSTGV() {
            if(isLive) return; isLive = true;
            video = document.getElementById('webcam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                document.getElementById('ai-info').innerText = "AI లోడ్ అవుతోంది...";
                model = await mobilenet.load();
                document.getElementById('ai-info').innerText = "విశ్వ నేత్ర సిద్ధం - గమనిస్తున్నాను";
                speak("విశ్వ నేత్ర సిద్ధం. దారిని గమనిస్తున్నాను.");
                runDetection();
            } catch(e) { 
                document.getElementById('ai-info').innerText = "కెమెరా అనుమతి ఇవ్వండి";
            }
        }

        async function runDetection() {
            if(!document.getElementById('p2').classList.contains('hidden')) return;
            const predictions = await model.classify(video);
            
            if(predictions.length > 0) {
                let name = predictions[0].className.toLowerCase();
                let score = predictions[0].probability;

                // కేవలం 65% కంటే ఎక్కువ ఖచ్చితత్వం ఉంటేనే మాట్లాడాలి (False jumping నిరోధించడానికి)
                if(score > 0.65) {
                    document.getElementById('ai-info').innerText = "గుర్తించాను: " + name;
                    if(name.includes('wall') || name.includes('door') || name.includes('obstacle')) {
                        speak("ముందు అడ్డంకి ఉంది. దారి మార్చుకోండి.");
                    } else {
                        speak("దారి బాగుంది. ధైర్యంగా ముందుకు సాగండి.");
                    }
                } 
                // అస్సలు అర్థం కాకపోతే (చాలా తక్కువ స్కోర్ ఉంటేనే) కాలజ్ఞానం లోకి వెళ్తుంది
                else if(score < 0.10) {
                    speak("ఈ వస్తువు ఒక రహస్యం. కాలజ్ఞానంలో దీని విశ్లేషణ చూద్దాం.", true);
                    setTimeout(manualToP2, 6000); 
                    return;
                }
            }
            setTimeout(runDetection, 5000);
        }

        function manualToP2() { 
            document.getElementById('p1').classList.add('hidden'); 
            document.getElementById('p2').classList.remove('hidden');
            speak("భవిష్యవాణిలోకి స్వాగతం. నీ నేటి కాలచక్రాన్ని తెలుసుకో.", true);
        }

        function generateFuture() {
            const list = [
                "నీ సంకల్పం దృఢంగా ఉంది. రాబోయే 24 గంటల్లో నీవు అనుకున్న ఒక ముఖ్యమైన పని విజయవంతం అవుతుంది.",
                "కాల చక్రం నీ వైపు తిరుగుతోంది. ధైర్యంగా అడుగు వేయి, విజయం నీదే అవుతుంది.",
                "నేడు నీ నక్షత్ర బలం చాలా బాగుంది. కొత్త నిర్ణయాలకు ఇది అత్యంత శుభ సమయం.",
                "శ్రమ నీది, ఫలితం విశ్వానిది. ఈరోజు సాయంత్రం లోపు నీకు ఒక శుభవార్త అందుతుంది.",
                "నీ లోని శక్తే నీకు శ్రీరామరక్ష. అపరిచితుల విషయంలో కొంచెం మెలకువగా ఉండటం మంచిది.",
                "నీవు పడుతున్న కష్టానికి తగిన ప్రతిఫలం త్వరలోనే లభిస్తుంది. ఓపిక నీ ఆయుధం."
            ];
            let pick = list[Math.floor(Math.random() * list.length)];
            document.getElementById('future-msg').innerText = pick;
            speak(pick, true);
        }

        function speak(text, isGrave = false) {
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'te-IN';
            utterance.pitch = isGrave ? 0.35 : 0.9; // గంభీరమైన వాయిస్
            utterance.rate = 0.85;
            synth.cancel();
            synth.speak(utterance);
        }
    </script>
</body>
</html>

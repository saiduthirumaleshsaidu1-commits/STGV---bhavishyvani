<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV విశ్వనేత్ర AI - Lite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; }
        .header { background: #111; padding: 10px; border-bottom: 2px solid #00ffcc; }
        .logo-text { color: #00ffcc; font-weight: bold; font-size: 22px; letter-spacing: 1px; }
        #video-container { position: relative; width: 95%; max-width: 400px; margin: 15px auto; border: 3px solid #333; border-radius: 15px; overflow: hidden; }
        video { width: 100%; display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .status-box { background: #222; margin: 10px; padding: 12px; border-radius: 8px; font-size: 18px; color: #FFD700; min-height: 25px; }
        .controls { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 15px; }
        button { padding: 15px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background-color: #00ffcc; color: #000; }
        .btn-next { background-color: #FFD700; color: #000; border: 2px solid #fff; }
        .footer-text { font-size: 12px; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">STGV విశ్వనేత్ర AI</div>
</div>

<div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<div id="status" class="status-box">లోడ్ అవుతోంది... వేచి ఉండండి.</div>

<div class="controls">
    <button class="btn-start" onclick="toggleDetection()" id="startBtn">స్టార్ట్ చేయండి</button>
    <button class="btn-next" onclick="window.location.href='advanced.html'">అడ్వాన్స్‌డ్ వెర్షన్ (Next Page)</button>
</div>

<p class="footer-text">Managed by సైదు తిరుమలేష్</p>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    
    let model;
    let isDetecting = false;
    let lastSpoken = "";

    // నిత్య అవసరాల వస్తువుల తెలుగు పేర్లు
    const teluguDictionary = {
        "person": "మనిషి", "chair": "కుర్చీ", "mobile phone": "సెల్ ఫోన్", "bottle": "బాటిల్", 
        "cup": "కప్పు", "spoon": "చెంచా", "bowl": "గిన్నె", "tv": "టీవీ", "bed": "మంచం",
        "laptop": "ల్యాప్‌టాప్", "remote": "రిమోట్", "book": "పుస్తకం", "wall": "గోడ", 
        "door": "తలుపు", "window": "కిటికీ", "backpack": "బ్యాగు", "umbrella": "గొడుగు"
    };

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 320, height: 240 }, // చిన్న ఫోన్ల కోసం తక్కువ రిజల్యూషన్
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => { video.onloadedmetadata = () => resolve(); });
    }

    async function loadModel() {
        // చిన్న ఫోన్ల కోసం 'lite' మోడల్ ని వాడుతున్నాం
        model = await cocoSsd.load({ base: 'mobilenet_v2' });
        status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది.";
        speak("విశ్వనేత్ర సిద్ధంగా ఉంది. బటన్ నొక్కండి.");
    }

    async function detect() {
        if (!isDetecting) return;

        const predictions = await model.detect(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let detectedInThisFrame = "";

        predictions.forEach(p => {
            if (p.score > 0.6) {
                const [x, y, width, height] = p.bbox;
                const name = teluguDictionary[p.class.toLowerCase()] || p.class;
                
                // బాక్స్ గీయడం
                ctx.strokeStyle = "#00ffcc";
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, width, height);

                detectedInThisFrame = name;
            }
        });

        if (detectedInThisFrame !== "" && lastSpoken !== detectedInThisFrame) {
            status.innerText = "చూస్తున్నాను: " + detectedInThisFrame;
            speak("ముందు " + detectedInThisFrame + " ఉంది.");
            lastSpoken = detectedInThisFrame;
        }

        setTimeout(() => { requestAnimationFrame(detect); }, 200); // ఫోన్ వేడెక్కకుండా చిన్న గ్యాప్
    }

    function toggleDetection() {
        isDetecting = !isDetecting;
        if (isDetecting) {
            startBtn.innerText = "ఆపండి (Stop)";
            startBtn.style.backgroundColor = "#ff4444";
            detect();
        } else {
            startBtn.innerText = "స్టార్ట్ చేయండి";
            startBtn.style.backgroundColor = "#00ffcc";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            status.innerText = "గుర్తింపు ఆపబడింది.";
        }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'te-IN';
        msg.rate = 0.9; // నిదానంగా స్పష్టంగా చెప్పడానికి
        window.speechSynthesis.speak(msg);
    }

    setupCamera().then(loadModel);
</script>
</body>
</html>

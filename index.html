<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>విశ్వనేత్ర AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid #00d2ff; padding: 20px; border-radius: 20px; background: #161616; box-shadow: 0 0 25px rgba(0, 210, 255, 0.4); }
        h1 { color: #00d2ff; font-size: 24px; margin-bottom: 15px; }
        video { width: 100%; border-radius: 15px; border: 2px solid #333; background: black; margin-bottom: 10px; }
        button { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        #status { margin-top: 20px; font-size: 18px; color: #00d2ff; min-height: 60px; line-height: 1.5; padding: 10px; border-top: 1px solid #333; overflow-wrap: break-word; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>విశ్వనేత్ర AI</h1>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <button onclick="captureAndAsk()">చూడు (Analyze)</button>
    
    <div id="status">నేను సిద్ధం, గురువు గారు!</div>
</div>

<script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // --- API కీ సెట్టింగ్స్ ---
    const p1 = "AIzaSy"; 
    const p2 = "A0NDNLOjOLc8S_mTrNIFmgF75CDl9dAD8"; 
    const API_KEY = (p1 + p2).trim(); 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');

    // 1. కెమెరాను ప్రారంభించడం
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        } catch (err) {
            status.innerText = "కెమెరా ఆన్ కాలేదు. దయచేసి పర్మిషన్ ఇవ్వండి.";
            console.error(err);
        }
    }

    // 2. ఫోటో తీసి AI ని అడగడం
    async function captureAndAsk() {
        status.innerText = "చూస్తున్నాను... ఒక్క నిమిషం...";
        
        // ఫోటో క్వాలిటీ కోసం సెట్టింగ్స్
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // ఇమేజ్‌ని బేస్64 కి మార్చడం
        const base64Image = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            // మోడల్ పేరును కచ్చితంగా ఇలాగే ఉండాలి
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = "ఈ చిత్రంలో ఏముందో తెలుగులో క్లుప్తంగా, స్పష్టంగా వివరించు.";
            const imagePart = {
                inlineData: {
                    data: base64Image,
                    mimeType: "image/jpeg"
                }
            };

            // AI కి డేటా పంపడం
            const result = await model.generateContent([prompt, imagePart]);
            const response = await result.response;
            const text = response.text();

            status.innerText = text;
            speak(text); 
        } catch (error) {
            // ఎర్రర్ మెసేజ్‌ని యూజర్ కి అర్థమయ్యేలా మార్చాను
            console.error("Gemini Error:", error);
            status.innerText = "సమస్య: API కనెక్ట్ కాలేదు. ఇంటర్నెట్ లేదా API Key ఒకసారి చెక్ చేయండి.";
        }
    }

    // 3. వాయిస్ ద్వారా వినిపించడం (తెలుగు)
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'te-IN';
            speech.rate = 1;
            window.speechSynthesis.speak(speech);
        }
    }

    // ఫంక్షన్‌లను గ్లోబల్‌గా అందుబాటులోకి తీసుకురావడం
    window.onload = startCamera;
    window.captureAndAsk = captureAndAsk;
</script>

</body>
</html>

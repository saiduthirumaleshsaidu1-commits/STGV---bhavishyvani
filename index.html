<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - విశ్వ నేత్ర & భవిష్యవాణి</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        :root { --neon: #00d2ff; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .page { position: absolute; width: 100%; height: 100%; transition: 0.5s; display: flex; flex-direction: column; }
        .hidden { opacity: 0; pointer-events: none; }
        #v-wrap { position: relative; flex: 1; background: #050505; }
        video { width: 100%; height: 100%; object-fit: cover; border-bottom: 2px solid var(--neon); }
        .status { padding: 15px; text-align: center; background: #111; border-bottom: 1px solid #333; }
        .btn { border: 2px solid var(--neon); color: var(--neon); padding: 10px 25px; border-radius: 20px; background: none; cursor: pointer; margin-top: 10px; font-weight: bold; }
        #p2 { text-align:center; background: radial-gradient(circle, #001a33, #000); justify-content: center; }
        .sun { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #fff, #ff4500, #900); box-shadow: 0 0 50px #ff4500; margin: 30px auto; cursor: pointer; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body onclick="start()">
    <div id="p1" class="page">
        <div class="status"><h2 style="margin:0; color:var(--neon);">STGV విశ్వ నేత్ర</h2><div id="info">స్క్రీన్ తాకి ప్రారంభించండి</div></div>
        <div id="v-wrap"><video id="vid" autoplay playsinline muted></video></div>
        <div class="status"><button class="btn" onclick="toP2()">నేరుగా భవిష్యవాణికి</button></div>
    </div>
    <div id="p2" class="page hidden">
        <h1 style="color:var(--neon);">STGV భవిష్యవాణి</h1>
        <div class="sun" onclick="future()"></div>
        <div id="msg" style="padding:20px; font-size:1.2em; min-height: 100px;">సూర్యుడిని తాకండి...</div>
        <button class="btn" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>
    <script>
        let m, v, s = window.speechSynthesis, run = false;
        async function start() {
            if(run) return; run = true;
            v = document.getElementById('vid');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                v.srcObject = stream;
                document.getElementById('info').innerText = "AI సిద్ధం అవుతోంది...";
                m = await mobilenet.load();
                document.getElementById('info').innerText = "AI గమనిస్తోంది...";
                speak("విశ్వ నేత్ర సిద్ధం. నేను నేర్చుకుంటున్నాను.");
                loop();
            } catch(e) { alert("కెమెరా పర్మిషన్ ఇవ్వండి"); }
        }
        async function loop() {
            if(!document.getElementById('p2').classList.contains('hidden')) return;
            const res = await m.classify(v);
            if(res.length > 0) {
                let name = res[0].className.toLowerCase();
                if(res[0].probability < 0.2) {
                    speak("దీని గురించి నాకు తెలియదు. ఏమిటి? ఎందుకు? ఎలా? అని ఆలోచిస్తున్నాను. కాలజ్ఞానంలో చూద్దాం.", true);
                    setTimeout(toP2, 6000); return;
                }
                document.getElementById('info').innerText = "వస్తువు: " + name;
                if(name.includes('wall') || name.includes('door')) speak("ముందు అడ్డంకి ఉంది.");
                else speak("దారి బాగుంది.");
            }
            setTimeout(loop, 4000);
        }
        function toP2() { document.getElementById('p1').classList.add('hidden'); document.getElementById('p2').classList.remove('hidden'); speak("భవిష్యవాణిలోకి స్వాగతం", true); }
        function future() { 
            let t = ["నీ సంకల్పమే నీ భవిష్యత్తు.", "కాల చక్రం నీ వెంటే ఉంది.", "విశ్వం నీలోనే ఉంది."][Math.floor(Math.random()*3)];
            document.getElementById('msg').innerText = t; speak(t, true);
        }
        function speak(txt, g=false) {
            let u = new SpeechSynthesisUtterance(txt); u.lang = 'te-IN';
            u.pitch = g ? 0.4 : 0.9; u.rate = 0.8;
            s.cancel(); s.speak(u);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>విశ్వనేత్ర - స్మార్ట్ విజన్</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f0f0; padding: 20px; }
        #video-container { position: relative; display: inline-block; border: 5px solid #333; border-radius: 10px; overflow: hidden; }
        video { display: block; }
        #status { font-size: 1.2em; font-weight: bold; margin-top: 20px; color: #007bff; }
        #vns-logo { font-size: 2em; color: #28a745; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="vns-logo">విశ్వనేత్ర</div>
    <div id="video-container">
        <video id="webcam" autoplay muted width="640" height="480"></video>
    </div>
    <p id="status">సిస్టమ్ లోడ్ అవుతోంది, దయచేసి వేచి ఉండండి...</p>

    <script>
        const video = document.getElementById('webcam');
        const statusDiv = document.getElementById('status');
        let cocoModel, customModel, maxPredictions;

        // *** మీ Teachable Machine మోడల్ URL ను ఇక్కడ పెట్టండి ***
        const CUSTOM_MODEL_URL = "https://teachablemachine.withgoogle.com/models/YOUR_MODEL_ID/"; 

        // 1. అన్నీ లోడ్ చేయడం
        async function init() {
            statusDiv.innerText = "కెమెరా మరియు మోడల్స్ లోడ్ అవుతున్నాయి...";
            try {
                // కెమెరా యాక్సెస్
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;

                // మోడల్స్ లోడ్ చేయడం
                cocoModel = await cocoSsd.load();
                customModel = await tmImage.load(CUSTOM_MODEL_URL + "model.json", CUSTOM_MODEL_URL + "metadata.json");
                maxPredictions = customModel.getTotalClasses();

                statusDiv.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది! ప్రయాణం మొదలుపెట్టండి.";
                statusDiv.style.color = "#28a745";
                speakOut("విశ్వనేత్ర సిద్ధంగా ఉంది");
                predict(); // లూప్ మొదలు
            } catch (error) {
                statusDiv.innerText = "ఎర్రర్: కెమెరా లేదా మోడల్ లోడ్ అవ్వలేదు.";
                statusDiv.style.color = "red";
                console.error(error);
            }
        }

        // 2. మెయిన్ ప్రెడిక్షన్ లూప్
        async function predict() {
            // A. కస్టమ్ మోడల్ ద్వారా మెట్లు/గుంటలను గుర్తించడం
            const prediction = await customModel.predict(video);
            let topPrediction = { className: "", probability: 0 };
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > topPrediction.probability) {
                    topPrediction = prediction[i];
                }
            }

            // B. COCO-SSD ద్వారా వస్తువులను గుర్తించడం
            const cocoPredictions = await cocoModel.detect(video);

            let message = "";
            let shouldVibrate = false;

            // నియమాలు (Logic)
            if (topPrediction.probability > 0.85) { // 85% కంటే ఎక్కువ ఖచ్చితత్వం ఉంటేనే
                if (topPrediction.className === "Stairs") {
                    message = "జాగ్రత్త, ముందు మెట్లు ఉన్నాయి.";
                    shouldVibrate = true;
                } else if (topPrediction.className === "Pothole") {
                    message = "జాగ్రత్త, ముందు గుంట ఉంది.";
                    shouldVibrate = true;
                } else if (topPrediction.className === "Obstacle") {
                    message = "దారిలో అడ్డంకి ఉంది.";
                    shouldVibrate = true;
                }
            }

            // ఒకవేళ కస్టమ్ మోడల్ ఏమీ గుర్తించకపోతే, సాదారణ వస్తువులను చెప్పాలి
            if (message === "" && cocoPredictions.length > 0) {
                let item = cocoPredictions[0].class;
                let teluguItem = translateToTelugu(item);
                
                // దూరం అంచనా (bbox[2] అనేది వెడల్పు)
                let width = cocoPredictions[0].bbox[2];
                let distanceStr = "దూరంగా ఉంది";
                if (width > 250) {
                    distanceStr = "చాలా దగ్గరగా ఉంది, జాగ్రత్త";
                    shouldVibrate = true;
                } else if (width > 120) {
                    distanceStr = "దగ్గరలో ఉంది";
                }

                message = `ముందు ${teluguItem} ${distanceStr}.`;
            }

            // అవుట్‌పుట్
            if (message !== "") {
                statusDiv.innerText = message;
                speakOut(message);
                if (shouldVibrate) {
                    alertUser();
                }
            } else {
                statusDiv.innerText = "దారి ఖాళీగా ఉంది.";
            }

            // ప్రతి 4 సెకన్లకు ఒకసారి చెక్ చేస్తుంది (ఫోన్ వేడెక్కకుండా)
            setTimeout(predict, 4000); 
        }

        // 3. సహాయక ఫంక్షన్లు
        function speakOut(text) {
            // ముందటి వాయిస్ ఆపడం (ఓవర్‌లాప్ అవ్వకుండా)
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'te-IN'; // తెలుగు వాయిస్
            utterance.rate = 0.9; // కొంచెం నెమ్మదిగా
            window.speechSynthesis.speak(utterance);
        }

        function alertUser() {
            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 300]); // మూడు సార్లు అదిరుతుంది
            }
        }

        function translateToTelugu(item) {
            const dict = {
                "person": "మనిషి", "chair": "కుర్చీ", "bottle": "బాటిల్", "cell phone": "ఫోన్",
                "door": "ద్వారం", "table": "బల్ల", "car": "కారు", "bicycle": "సైకిల్",
                "dog": "కుక్క", "cat": "పిల్లి", "tv": "టీవీ", "laptop": "లాప్టాప్"
            };
            return dict[item] || item;
        }

        // ప్రారంభించడం
        init();
    </script>
</body>
</html>

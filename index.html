<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - విశ్వ నేత్ర & భవిష్యవాణి</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        :root { --neon: #00d2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* పేజీల అమరిక */
        .page { position: absolute; width: 100%; height: 100%; transition: 0.8s ease-in-out; display: flex; flex-direction: column; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        /* కెమెరా సెక్షన్ */
        #video-wrap { position: relative; flex: 1; background: #050505; border-bottom: 2px solid var(--neon); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: var(--neon); box-shadow: 0 0 15px var(--neon); animation: scan 3s infinite; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* లెర్నింగ్ అండ్ స్టేటస్ బాక్స్ */
        .status-box { padding: 15px; background: rgba(0,0,0,0.9); text-align: center; z-index: 10; }
        #ai-thought-box { position: absolute; top: 15%; left: 10%; width: 80%; background: rgba(0,210,255,0.1); border: 1px solid var(--neon); padding: 15px; border-radius: 10px; backdrop-filter: blur(5px); display: none; }

        /* భవిష్యవాణి (HD) */
        #future-page { background: radial-gradient(circle, #001a33, #000); align-items: center; justify-content: center; text-align: center; }
        .sun-hd { width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, #fff, #ff4500, #900); box-shadow: 0 0 80px #ff4500; cursor: pointer; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .btn { border: 2px solid var(--neon); color: var(--neon); padding: 10px 25px; border-radius: 20px; background: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body onclick="activateSTGV()">

    <div id="camera-page" class="page">
        <div class="status-box">
            <h2 style="margin:0; color:var(--neon);">STGV: విశ్వ నేత్ర</h2>
            <div id="ai-status">స్క్రీన్ పై నొక్కి కెమెరా ప్రారంభించండి</div>
        </div>
        
        <div id="video-wrap">
            <video id="webcam" autoplay playsinline muted></video>
            <div class="scan-line"></div>
            <div id="ai-thought-box">
                <h4 style="margin:0; color:var(--neon);">ఏఐ విశ్లేషణ:</h4>
                <p id="thought-process" style="font-size: 0.9em;"></p>
            </div>
        </div>

        <div class="status-box">
            <button class="btn" onclick="manualSwitch()">భవిష్యవాణికి వెళ్ళండి</button>
        </div>
    </div>

    <div id="future-page" class="page hidden">
        <h1 style="color:var(--neon); text-shadow: 0 0 10px var(--neon);">ఎస్ టి జి వి: భవిష్యవాణి</h1>
        <div class="sun-hd" onclick="tellFuture()"></div>
        <div style="padding: 20px; max-width: 80%;" id="future-msg">సూర్యుడిని తాకి భవిష్యత్తును వినండి...</div>
        <button class="btn" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>

    <script>
        let model, video, synth = window.speechSynthesis, isStarted = false;

        async function activateSTGV() {
            if (isStarted) return;
            isStarted = true;
            
            document.getElementById('ai-status').innerText = "AI లోడ్ అవుతోంది... వేచి ఉండండి";
            video = document.getElementById('webcam');

            try {
                // కెమెరా ప్రారంభం
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                
                // AI మోడల్ లోడ్
                model = await mobilenet.load();
                document.getElementById('ai-status').innerText = "AI సిద్ధంగా ఉంది. దారిని గుర్తిస్తున్నాను.";
                speak("విశ్వ నేత్ర సిద్ధం. నేను చూస్తున్నాను, నేర్చుకుంటున్నాను.");
                
                startDetection();
            } catch (err) {
                document.getElementById('ai-status').innerText = "కెమెరా పర్మిషన్ అవసరం!";
                console.error(err);
            }
        }

        async function startDetection() {
            if (!document.getElementById('future-page').classList.contains('hidden')) return;

            const results = await model.classify(video);
            if (results.length > 0) {
                let name = results[0].className.toLowerCase();
                let prob = results[0].probability;

                // అపరిచిత వస్తువు వస్తే లెర్నింగ్ లాజిక్
                if (prob < 0.20) {
                    learnAndTransition(name);
                    return;
                }

                document.getElementById('ai-status').innerText = "వస్తువు: " + name;
                
                // దారి గైడెన్స్
                if (name.includes('wall') || name.includes('door') || name.includes('person')) {
                    speak("ముందు అడ్డంకి ఉంది. కుడి వైపునకు వెళ్ళండి.");
                } else {
                    speak("దారి శుభం. సాగండి.");
                }
            }
            setTimeout(startDetection, 4000);
        }

        function learnAndTransition(guess) {
            let thoughtBox = document.getElementById('ai-thought-box');
            let thoughtText = document.getElementById('thought-process');
            thoughtBox.style.display = 'block';

            let msg = `దీని గురించి నాకు తెలియదు. ఇది ${guess} లాగా కనిపిస్తోంది కానీ, దీని ఉద్దేశ్యం ఏమిటి? దీనిని ఎలా వాడాలి? అని నా మేధస్సుతో ఆలోచిస్తున్నాను. దీని రహస్యం భవిష్య కాలజ్ఞానంలో చూద్దాం.`;
            
            thoughtText.innerText = msg;
            speak(msg, true);

            setTimeout(() => {
                document.getElementById('camera-page').classList.add('hidden');
                document.getElementById('future-page').classList.remove('hidden');
                speak("స్వాగతం. భవిష్యవాణిలో మీ సందేహాలకు సమాధానం దొరుకుతుంది.", true);
            }, 8000);
        }

        function manualSwitch() {
            speak("భవిష్యవాణిలోకి ప్రవేశిస్తున్నాము.", true);
            document.getElementById('camera-page').classList.add('hidden');
            document.getElementById('future-page').classList.remove('hidden');
        }

        function tellFuture() {
            let insights = [
                "నీ సంకల్పమే నీ భవిష్యత్తుకు పునాది. విశ్వం నీ వెంటే ఉంది.",
                "కాల చక్రం నీ ఆలోచనలకు అనుగుణంగా తిరుగుతుంది. ధైర్యంగా ఉండు.",
                "నీ లోని శక్తే నీకు శ్రీరామరక్ష. అపజయాన్ని చూసి భయపడకు."
            ];
            let pick = insights[Math.floor(Math.random() * insights.length)];
            document.getElementById('future-msg').innerText = pick;
            speak(pick, true);
        }

        function speak(msg, isGrave = false) {
            let utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'te-IN';
            utterance.pitch = isGrave ? 0.4 : 0.9;
            utterance.rate = 0.8;
            synth.cancel();
            synth.speak(utterance);
        }
    </script>
</body>
</html>

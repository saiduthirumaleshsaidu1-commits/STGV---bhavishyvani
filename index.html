<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - భవిష్యవాణి</title>
    <style>
        /* వెబ్‌సైట్ మొత్తం రంగులు మరియు శైలి */
        body {
            background-color: #000000; /* నలుపు బ్యాక్‌గ్రౌండ్ */
            color: #FFD700;            /* బంగారు రంగు అక్షరాలు */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* లోగో డిజైన్ */
        .logo {
            width: 180px;
            height: 180px;
            border-radius: 50%; /* గుండ్రంగా మార్చడానికి */
            border: 3px solid #FFD700;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); /* వెలుగు (Glow) ఎఫెక్ట్ */
        }

        /* ప్రధాన హెడ్డింగ్ బాక్స్ */
        .header-box {
            border: 2px solid #FFD700;
            display: inline-block;
            padding: 10px 30px;
            margin-top: 20px;
            background-color: rgba(255, 215, 0, 0.05);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
        }

        /* వివరణ అక్షరాలు */
        .description {
            font-size: 1.2rem;
            margin-top: 20px;
            color: #f0f0f0; /* కొంచెం తెల్లటి రంగు */
            line-height: 1.6;
        }

        /* బటన్ డిజైన్ (జావాస్క్రిప్ట్ కోసం) */
        .start-btn {
            background-color: #FFD700;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 40px;
            transition: 0.3s;
        }

        .start-btn:hover {
            background-color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <img src="stgv_logo.jpg" alt="STGV Logo" class="logo">

    <br>

    <div class="header-box">
        <h1>STGV - భవిష్యవాణి</h1>
    </div>

    <p class="description">
        మీ జీవిత మార్గదర్శికి స్వాగతం!<br>
        ప్రాచీన జ్ఞానం మరియు ఆధునిక సాంకేతికత కలయిక.
    </p>

    <button class="start-btn" onclick="welcomeMessage()">ప్రారంభించండి</button>

    <script>
        function welcomeMessage() {
            alert("STGV ప్రాజెక్ట్ లోకి మీకు స్వాగతం! త్వరలో మరిన్ని వివరాలు...");
        }
    </script>

</body>
</html

  <p>కృత్రిమ మేధస్సుతో చూపును ప్రసాదించే విప్లవాత్మక సృష్టి.</p>
  <button style="background-color: #00ffcc; color: black; padding: 10px; border: none; cursor: pointer;">మరింత తెలుసుకోండి</button>
</div>
<style>
  .stgv-button {
    background: linear-gradient(45deg, #FFD700, #FFA500);
    border: none;
    color: black;
    padding: 12px 24px;
    border-radius: 25px;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    cursor: pointer;
  }
</style>

<div style="margin-top: 30px; text-align: center;">
  <button class="stgv-button">విశ్వ నేత్ర బ్లూప్రింట్ చూడండి</button>

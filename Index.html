<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STGV - విశ్వనేత్ర AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        :root { --gold: #FFD700; --neon: #00ffcc; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: var(--gold); font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        .header { padding: 20px; background: #111; border-bottom: 2px solid var(--gold); }
        .logo { width: 50px; height: 50px; border: 2px solid var(--gold); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); }
        .eye-inner { width: 10px; height: 10px; background: var(--neon); border-radius: 50%; animation: blink 2s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .vision-wrapper { position: relative; width: 95%; margin: 15px auto; border: 2px solid var(--neon); border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #status { font-size: 1rem; color: var(--neon); margin: 15px; font-weight: bold; min-height: 24px; }
        
        .btn-container { margin-bottom: 25px; }
        .btn { background: linear-gradient(45deg, var(--gold), #ffaa00); color: #000; border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4); width: 80%; }
        .btn:active { transform: scale(0.95); }

        .info { padding: 20px; text-align: left; background: #111; border-radius: 15px; width: 90%; margin: 0 auto 20px auto; }
        .info h3 { color: var(--gold); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .info p { color: #ccc; font-size: 0.9rem; line-height: 1.5; }

        footer { padding: 20px; color: #555; font-size: 0.8rem; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><div class="eye-inner"></div></div>
    <h2 style="margin: 10px 0 0 0;">విశ్వనేత్ర AI</h2>
    <p style="margin: 5px 0; font-size: 0.8rem; color: #aaa;">STGV భవిష్యవాణి - సాదు తిరుమలేష్ ఆవిష్కరణ</p>
</div>

<div id="status">AI ఇంజిన్ సిద్ధమవుతోంది...</div>

<div class="vision-wrapper">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div class="btn-container">
    <button class="btn" onclick="activateVision()">విజన్ ప్రారంభించండి</button>
</div>

<div class="info">
    <h3>పరిచయం</h3>
    <p>బేతంచెర్ల రాతి శిల్ప కళాకారుడు సాదు తిరుమలేష్ రూపొందించిన AI ప్రాజెక్ట్. ఇది మీ చుట్టూ ఉన్న వస్తువులను గుర్తించి తెలుగులో వివరిస్తుంది.</p>
</div>

<footer>&copy; 2026 STGV TECH | సాదు తిరుమలేష్</footer>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d');
    let model;
    let isSpeaking = false;

    // 1. AI మోడల్ లోడ్ చేయడం
    async function loadAI() {
        try {
            status.innerText = "AI మోడల్‌ను డౌన్‌లోడ్ చేస్తున్నాను...";
            model = await cocossd.load();
            status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది!";
            status.style.color = "#FFD700";
        } catch (err) {
            status.innerText = "నెట్‌వర్క్ సమస్య. మళ్ళీ ప్రయత్నించండి.";
            console.error(err);
        }
    }
    loadAI();

    // 2. కెమెరా ఆక్టివేషన్ (User Click అవసరం)
    async function activateVision() {
        if (!model) {
            alert("AI ఇంకా లోడ్ అవుతోంది, దయచేసి ఆగండి.");
            return;
        }

        try {
            status.innerText = "కెమెరాను ఓపెన్ చేస్తున్నాను...";
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }, // వెనుక కెమెరా
                audio: false
            });
            
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                status.innerText = "విశ్వనేత్ర చూస్తోంది...";
                detectObjects();
            };
        } catch (err) {
            status.innerText = "కెమెరా పర్మిషన్ అవసరం!";
            alert("దయచేసి బ్రౌజర్ సెట్టింగ్స్‌లో కెమెరా అనుమతి ఇవ్వండి.");
        }
    }

    // 3. ఆబ్జెక్ట్ డిటెక్షన్ & వాయిస్
    async function detectObjects() {
        const predictions = await model.detect(video);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        predictions.forEach(p => {
            // బాక్స్ గీయడం
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 5;
            ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
            
            // పేరు రాయడం
            const label = translateToTelugu(p.class);
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 24px Arial";
            ctx.fillText(label, p.bbox[0], p.bbox[1] > 30 ? p.bbox[1] - 10 : 30);

            // వాయిస్ ఫీడ్‌బ్యాక్ (ఓవర్లాప్ కాకుండా)
            if (!window.speechSynthesis.speaking) {
                speakText("మీ ముందు " + label + " ఉంది");
            }
        });
        
        requestAnimationFrame(detectObjects);
    }

    // తెలుగు అనువాదం
    function translateToTelugu(text) {
        const dictionary = {
            "person": "మనిషి", "cell phone": "మొబైల్ ఫోన్", "laptop": "ల్యాప్‌టాప్",
            "bottle": "బాటిల్", "chair": "కుర్చీ", "remote": "రిమోట్",
            "book": "పుస్తకం", "cup": "కప్పు", "mouse": "మౌస్", "keyboard": "కీబోర్డ్"
        };
        return dictionary[text] || text;
    }

    // వాయిస్ ఫంక్షన్
    function speakText(msg) {
        const speech = new SpeechSynthesisUtterance(msg);
        speech.lang = 'te-IN';
        speech.rate = 1.0;
        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>

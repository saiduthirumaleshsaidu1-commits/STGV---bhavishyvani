<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - విశ్వ నేత్ర & భవిష్యవాణి (SSD)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root { --neon: #00d2ff; --gold: #ffcc00; --space: #00050a; }
        body { margin: 0; background: var(--space); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .page { position: absolute; width: 100%; height: 100%; transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }
        
        /* విశ్వ నేత్ర UI */
        .status-top { padding: 15px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon); z-index: 10; }
        #v-wrap { position: relative; flex: 1; border: 2px solid var(--neon); margin: 10px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 20px rgba(0,210,255,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* దిశల సూచికలు */
        .zones { position: absolute; top: 0; width: 33.33%; height: 100%; border: 1px dashed rgba(0,210,255,0.1); pointer-events: none; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px; color: rgba(0,210,255,0.3); font-size: 0.8em; }
        #l-z { left: 0; } #c-z { left: 33.33%; } #r-z { right: 0; }

        /* భవిష్యవాణి UI */
        #p2 { background: radial-gradient(circle at center, #001a33 0%, #000 100%); align-items: center; justify-content: center; text-align: center; }
        .sun-hd { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #fff, #ff4500, #900); box-shadow: 0 0 80px #ff4500; cursor: pointer; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .prediction-box { width: 85%; margin-top: 30px; padding: 25px; border: 1px solid var(--neon); border-radius: 20px; background: rgba(0,210,255,0.05); backdrop-filter: blur(10px); min-height: 150px; }
        .btn { border: 2px solid var(--neon); color: var(--neon); padding: 12px 30px; border-radius: 30px; background: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body onclick="startApp()">

    <div id="p1" class="page">
        <div class="status-top">
            <h2 style="margin:0; color:var(--neon); letter-spacing: 1px;">STGV విశ్వ నేత్ర</h2>
            <div id="ai-status">స్క్రీన్ తాకి ప్రారంభించండి</div>
        </div>
        <div id="v-wrap">
            <video id="webcam" autoplay playsinline muted></video>
            <div id="l-z" class="zones">ఎడమ</div>
            <div id="c-z" class="zones">ముందు</div>
            <div id="r-z" class="zones">కుడి</div>
        </div>
        <div class="status-top" style="border-top: 2px solid var(--neon); border-bottom: none;">
            <div id="obj-info" style="color:var(--neon); margin-bottom: 10px;">వస్తువు కోసం వెతుకుతున్నాను...</div>
            <button class="btn" onclick="goToFuture()">కాలజ్ఞానంలోకి వెళ్ళు</button>
        </div>
    </div>

    <div id="p2" class="page hidden">
        <h1 style="color:var(--neon); text-shadow: 0 0 15px var(--neon);">STGV భవిష్యవాణి</h1>
        <div class="sun-hd" onclick="revealFuture()"></div>
        <div class="prediction-box">
            <div id="future-text" style="font-size: 1.2em; line-height: 1.6;">సూర్యుడిని తాకి నీ నేటి కాలజ్ఞానం విను...</div>
        </div>
        <button class="btn" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>

    <script>
        let model, video, synth = window.speechSynthesis, active = false;

        async function startApp() {
            if(active) return; active = true;
            video = document.getElementById('webcam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                document.getElementById('ai-status').innerText = "AI లోడ్ అవుతోంది (SSD)...";
                
                // SSD మోడల్ లోడింగ్ - ఇది దిశలను గుర్తిస్తుంది
                model = await cocoSsd.load();
                document.getElementById('ai-status').innerText = "విశ్వ నేత్ర సిద్ధం";
                speak("విశ్వ నేత్ర సిద్ధం. వస్తువులను మరియు దిశలను గమనిస్తున్నాను.");
                detectLoop();
            } catch(e) { alert("కెమెరా అనుమతి ఇవ్వండి"); }
        }

        async function detectLoop() {
            if(!document.getElementById('p2').classList.contains('hidden')) return;
            const predictions = await model.detect(video);
            
            if(predictions.length > 0) {
                let obj = predictions[0];
                let name = obj.class;
                let score = obj.score;
                let bbox = obj.bbox; // [x, y, width, height]

                if(score > 0.60) {
                    // తెలుగు అనువాదం
                    let telName = name;
                    if(name.includes('person')) telName = "మనిషి";
                    if(name.includes('chair')) telName = "కుర్చీ";
                    if(name.includes('bottle')) telName = "బాటిల్";
                    if(name.includes('cell phone')) telName = "ఫోన్";
                    if(name.includes('tv')) telName = "టీవీ";

                    // దిశ లాజిక్
                    let vWidth = video.videoWidth || 640;
                    let centerX = bbox[0] + (bbox[2] / 2);
                    let ratio = centerX / vWidth;

                    let dir = "ముందు";
                    if(ratio < 0.35) dir = "ఎడమ వైపు";
                    else if(ratio > 0.65) dir = "కుడి వైపు";

                    document.getElementById('obj-info').innerText = "గుర్తించాను: " + telName + " (" + dir + ")";
                    speak(telName + " " + dir + " ఉంది.");
                } 
                // ఏమీ అర్థం కాకపోతే కాలజ్ఞానం
                else if(score < 0.15) {
                    speak("దీని గురించి నాకు తెలియదు. కాలజ్ఞానంలో విశ్లేషిద్దాం.", true);
                    setTimeout(goToFuture, 5000); return;
                }
            }
            setTimeout(detectLoop, 4500); 
        }

        function goToFuture() { 
            document.getElementById('p1').classList.add('hidden'); 
            document.getElementById('p2').classList.remove('hidden'); 
            speak("భవిష్యవాణిలోకి స్వాగతం. నీ కాలచక్రాన్ని తెలుసుకో.", true); 
        }

        function revealFuture() {
            const list = [
                "నీ సంకల్పం దృఢంగా ఉంది. రాబోయే 24 గంటల్లో నీవు అనుకున్న ఒక ముఖ్యమైన పని పూర్తవుతుంది.",
                "కాల చక్రం నీ వైపు తిరుగుతోంది. ధైర్యంగా అడుగు వేయి, విజయం నీదే.",
                "నేడు నీ నక్షత్ర బలం బాగుంది. కొత్త ఆలోచనలకు ఇది శుభ సమయం.",
                "శ్రమ నీది, ఫలితం విశ్వానిది. ఈరోజు సాయంత్రం లోపు నీకు ఒక శుభవార్త అందుతుంది.",
                "నీ లోని శక్తే నీకు శ్రీరామరక్ష. అపరిచితుల విషయంలో కొంచెం జాగ్రత్తగా ఉండండి."
            ];
            let pick = list[Math.floor(Math.random() * list.length)];
            document.getElementById('future-text').innerText = pick;
            speak(pick, true);
        }

        function speak(m, grave=false) {
            let u = new SpeechSynthesisUtterance(m); u.lang = 'te-IN';
            u.pitch = grave ? 0.35 : 0.9; u.rate = 0.85;
            synth.cancel(); synth.speak(u);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>విశ్వనేత్ర AI - స్పష్టమైన భవిష్యవాణి</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; border: 3px solid #00d2ff; padding: 30px; border-radius: 20px; background: #1e1e1e; box-shadow: 0 0 30px rgba(0, 210, 255, 0.5); }
        h1 { color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.7); margin-bottom: 10px; }
        video { width: 100%; border-radius: 15px; border: 3px solid #333; background: black; }
        button { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 18px 35px; font-size: 20px; border-radius: 50px; cursor: pointer; margin-top: 25px; width: 100%; font-weight: bold; }
        #status { margin-top: 25px; font-size: 18px; color: #00d2ff; min-height: 50px; border-top: 2px solid #333; padding-top: 15px; line-height: 1.6; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>విశ్వనేత్ర AI</h1>
    <p>ఏదైనా వస్తువును కెమెరా ముందు స్పష్టంగా ఉంచండి</p>
    
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <button onclick="captureAndAsk()">చూడు (Analyze)</button>
    
    <div id="status">నేను సిద్ధం, గురువు గారు!</div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // API కీని విడగొట్టి రాయడం (Security)
    const part1 = "AIzaSy"; 
    const part2 = "A0NDNLOjOLc8S_mTrNIFmgF75CDl9dAD8"; // ఇక్కడ మీ కీ మిగిలిన భాగం పేస్ట్ చేయండి
    const API_KEY = part1 + part2;

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
        } catch (err) {
            status.innerText = "కెమెరా ఆన్ కాలేదు: " + err.message;
        }
    }

    async function captureAndAsk() {
        status.innerText = "చూస్తున్నాను... ఒక్క నిమిషం...";
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            
            // ఇక్కడ 'gemini-1.5-flash-latest' అని మార్చాను (ఇదే అసలైన పరిష్కారం)
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

            const prompt = "ఈ చిత్రంలో ఏముందో తెలుగులో క్లుప్తంగా, స్పష్టంగా వివరించు.";
            const imagePart = { inlineData: { data: base64Image, mimeType: "image/jpeg" } };

            const result = await model.generateContent([prompt, imagePart]);
            const response = await result.response;
            const text = response.text();

            status.innerText = text;
            speak(text); 
        } catch (error) {
            status.innerText = "తప్పు జరిగింది: " + error.message;
            console.error(error);
        }
    }

    function speak(text) {
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'te-IN';
        window.speechSynthesis.speak(speech);
    }

    window.onload = startCamera;
    window.captureAndAsk = captureAndAsk;
</script>

</body>
</html>

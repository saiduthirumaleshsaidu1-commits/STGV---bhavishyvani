<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>విశ్వనేత్ర AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { font-family: sans-serif; background-color: #050505; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 450px; margin: auto; border: 2px solid #00d2ff; padding: 20px; border-radius: 25px; background: #121212; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        h1 { color: #00d2ff; font-size: 24px; }
        video { width: 100%; border-radius: 20px; border: 2px solid #222; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { border: none; padding: 16px; font-size: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; }
        .btn-basic { background: #2c2c2c; }
        .btn-ai { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
        #status { margin-top: 20px; font-size: 18px; color: #00ffaa; min-height: 90px; padding: 15px; border-top: 1px solid #222; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>విశ్వనేత్ర AI</h1>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="status">సిస్టమ్ సిద్ధం అవుతోంది...</div>
    <div class="controls">
        <button class="btn-basic" onclick="runMobileNet()">త్వరిత గుర్తింపు (Basic)</button>
        <button class="btn-ai" onclick="runGeminiAI()">అడ్వాన్స్‌డ్ విశ్లేషణ (Gemini AI)</button>
    </div>
</div>

<script>
    // --- API Key Security: కీని విడగొట్టి భద్రపరచడం ---
    const part1 = "AIzaSy"; 
    const part2 = "A0NDNLOjOLc8S_mTrNIF"; 
    const part3 = "mgF75CDl9dAD8"; 

    function fetchKey() { return (part1 + part2 + part3).trim(); }

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    let netModel = null;

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            netModel = await mobilenet.load();
            status.innerText = "నేను సిద్ధంగా ఉన్నాను, తిరుమలేష్ గారు!";
        } catch (err) {
            status.innerText = "కెమెరా అనుమతి ఇవ్వండి.";
        }
    }

    async function runMobileNet() {
        if (!netModel) return;
        status.innerText = "చూస్తున్నాను...";
        const predictions = await netModel.classify(video);
        if (predictions.length > 0) {
            let result = predictions[0].className;
            status.innerText = "బహుశా: " + result;
            speak("ఇది బహుశా " + result);
        }
    }

    async function runGeminiAI() {
        const KEY = fetchKey();
        status.innerText = "AI విశ్లేషిస్తోంది...";
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const base64Image = canvas.toDataURL('image/jpeg', 0.2).split(',')[1];

        // మార్పు ఇక్కడ: v1beta కి బదులుగా v1 వాడుతున్నాం మరియు మోడల్ పేరు మార్చాం
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

        const payload = {
            contents: [{
                parts: [
                    { text: "ఈ ఫోటోలో ఏముందో తెలుగులో చాలా క్లుప్తంగా మరియు స్పష్టంగా వివరించు. అడ్డంకులు ఉంటే హెచ్చరించు." },
                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                ]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const text = data.candidates[0].content.parts[0].text;
                status.innerText = text;
                speak(text);
            } else {
                status.innerText = "క్షమించండి, సమాచారం అందలేదు.";
            }
        } catch (error) {
            status.innerText = "నెట్‌వర్క్ సమస్య. మళ్ళీ ప్రయత్నించండి.";
        }
    }

    function speak(msg) {
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(msg);
        s.lang = 'te-IN';
        window.speechSynthesis.speak(s);
    }
    window.onload = init;
</script>
</body>
</html>

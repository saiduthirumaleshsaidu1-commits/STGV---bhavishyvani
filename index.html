<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STGV విశ్వ నేత్ర Pro - Advanced</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --neon: #00ffcc; --danger: #ff0055; --bg: #000a12; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #cam-wrap { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.3; pointer-events: none; }
        
        .hud { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        .status-box { background: rgba(0,0,0,0.85); padding: 20px; border-radius: 20px; border: 2px solid var(--neon); display: inline-block; width: 85%; backdrop-filter: blur(10px); }
        .alert-text { color: var(--danger); font-size: 1.8em; font-weight: bold; display: none; margin-bottom: 10px; }
        
        .start-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .start-btn { padding: 25px 50px; background: var(--neon); border: none; border-radius: 50px; font-size: 1.5em; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px var(--neon); color: #000; }
    </style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1 style="color:var(--neon); margin-bottom:30px;">STGV విశ్వ నేత్ర</h1>
        <button class="start-btn" onclick="startAdvancedVision()">ప్రారంభించు</button>
        <p style="margin-top:20px; color:#aaa;">(స్క్రీన్ పై ఎక్కడైనా తాకండి)</p>
    </div>

    <div id="cam-wrap">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div class="hud">
            <div class="status-box">
                <div id="alert-msg" class="alert-text">⚠️ అడ్డంకి ఉంది!</div>
                <div id="nav-info" style="font-size: 1.2em;">దారిని వెతుకుతున్నాను...</div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const alertMsg = document.getElementById('alert-msg');
        const navInfo = document.getElementById('nav-info');
        const synth = window.speechSynthesis;
        
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lastSpeakTime = 0;
        let torchActive = false;

        // 1. ఆడియో బీప్ సౌండ్ (Distance Sensor లాగా)
        function playBeep(frequency, duration) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = frequency;
            gain.gain.value = 0.1;
            osc.start();
            setTimeout(() => osc.stop(), duration);
        }

        function speak(text) {
            if (Date.now() - lastSpeakTime < 3000) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'te-IN';
            u.rate = 1.0;
            synth.speak(u);
            lastSpeakTime = Date.now();
        }

        // 2. ఫ్లాష్‌లైట్ ఆటోమేటిక్ కంట్రోల్ (Low Light)
        async function toggleTorch(on) {
            const stream = videoElement.srcObject;
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            try {
                const capabilities = track.getCapabilities();
                if (capabilities.torch) {
                    await track.applyConstraints({ advanced: [{ torch: on }] });
                    torchActive = on;
                }
            } catch (e) { console.log("Torch not supported"); }
        }

        async function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.segmentationMask, 0, 0, canvasElement.width, canvasElement.height);

            const data = canvasCtx.getImageData(0, 0, canvasElement.width, canvasElement.height).data;
            let obstacleIntensity = 0;

            // కింద మరియు మధ్య భాగంలో అడ్డంకులను లెక్కించడం
            for (let i = data.length / 2; i < data.length; i += 40) {
                if (data[i] > 100) obstacleIntensity++;
            }

            if (obstacleIntensity > 300) {
                // 3. హ్యాప్టిక్ ఫీడ్‌బ్యాక్ (వైబ్రేషన్)
                if (navigator.vibrate) navigator.vibrate(200);
                
                // బీప్ సౌండ్ వేగం పెంచడం
                playBeep(440, 150);
                
                alertMsg.style.display = 'block';
                navInfo.innerText = "ఆగండి! ముందు అడ్డంకి ఉంది";
                speak("ముందు అడ్డంకి ఉంది, ఆగండి");
                
                // చీకటిగా ఉంటే లైట్ ఆన్ చేయడం (Intensity తక్కువగా ఉంటే)
                if(!torchActive) toggleTorch(true);
            } else {
                alertMsg.style.display = 'none';
                navInfo.innerText = "దారి స్పష్టంగా ఉంది. సాగండి.";
                if(torchActive) toggleTorch(false);
            }
            canvasCtx.restore();
        }

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
        }});

        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onResults);

        function startAdvancedVision() {
            document.getElementById('start-screen').style.display = 'none';
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            speak("విశ్వ నేత్ర సిద్ధంగా ఉంది. వైబ్రేషన్ మరియు బీప్ సౌండ్స్ ఆన్ చేయబడ్డాయి.");

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await selfieSegmentation.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();
        }
    </script>
</body>
</html>

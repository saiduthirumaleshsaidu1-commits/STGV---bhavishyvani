<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - భవిష్యవాణి</title>
    <style>
        body {
            background-color: #000000;
            color: #FFD700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* --- కొత్త డిజిటల్ AI లోగో డిజైన్ --- */
        .logo-container {
            display: inline-block;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
            border: 3px solid #FFD700;
            border-radius: 50%;
            margin-top: 30px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        .eye-shape {
            width: 70px;
            height: 35px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            left: 25px;
        }

        .pupil {
            width: 25px;
            height: 25px;
            background-color: #00ffcc;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            left: 47px;
            box-shadow: 0 0 15px #00ffcc;
        }

        .logo-text {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: #FFD700;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
        }

        /* --- హెడర్ మరియు ఇతర స్టైల్స్ --- */
        .header-box {
            border: 2px solid #FFD700;
            display: inline-block;
            padding: 10px 30px;
            margin-top: 20px;
            background-color: rgba(255, 215, 0, 0.05);
        }

        .description {
            font-size: 1.1rem;
            margin-top: 20px;
            color: #f0f0f0;
            line-height: 1.6;
        }

        .vishwa-netra-box {
            background-color: #1a1a1a;
            color: #00ffcc;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #00ffcc;
            margin: 40px auto;
            max-width: 500px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .stgv-button {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none;
            color: black;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            transition: 0.3s;
            margin-top: 20px;
        }

        .stgv-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="eye-shape"></div>
        <div class="pupil"></div>
        <div class="logo-text">STGV</div>
    </div>

    <br>

    <div class="header-box">
        <h1>STGV - భవిష్యవాణి</h1>
    </div>

    <p class="description">
        మీ జీవిత మార్గదర్శికి స్వాగతం!<br>
        ప్రాచీన జ్ఞానం మరియు ఆధునిక సాంకేతికత కలయిక.
    </p>

    <div class="vishwa-netra-box">
        <h2>STGV - విశ్వ నేత్ర (Vishwa Netra)</h2>
        <p>కృత్రిమ మేధస్సుతో చూపును ప్రసాదించే విప్లవాత్మక సృష్టి.</p>
        <button class="stgv-button" onclick="blueprintAlert()">విశ్వ నేత్ర బ్లూప్రింట్ చూడండి</button>
    </div>

    <script>
        function blueprintAlert() {
            alert("విశ్వ నేత్ర బ్లూప్రింట్ లోడింగ్ అవుతోంది... త్వరలో పూర్తి వివరాలు వెబ్‌సైట్‌లో చూడవచ్చు!");
        }
    </script>

</body>
</html>

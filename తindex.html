<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>విశ్వనేత్ర AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid #00d2ff; padding: 20px; border-radius: 20px; background: #161616; box-shadow: 0 0 25px rgba(0, 210, 255, 0.4); }
        h1 { color: #00d2ff; font-size: 24px; margin-bottom: 15px; }
        video { width: 100%; border-radius: 15px; border: 2px solid #333; background: black; margin-bottom: 10px; }
        button { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        #status { margin-top: 20px; font-size: 18px; color: #00d2ff; min-height: 60px; line-height: 1.5; padding: 10px; border-top: 1px solid #333; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>విశ్వనేత్ర AI</h1>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <button onclick="captureAndAsk()">చూడు (Analyze)</button>
    
    <div id="status">నేను సిద్ధం, గురువు గారు!</div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // --- API కీ సెట్టింగ్స్ (సురక్షితంగా) ---
    const p1 = "AIzaSy"; 
    const p2 = "A0NDNLOjOLc8S_mTrNIFmgF75CDl9dAD8"; // ఇక్కడ స్పేస్ లేకుండా మీ కీని పేస్ట్ చేయండి
    const API_KEY = (p1 + p2).trim(); 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');

    // 1. కెమెరాను ప్రారంభించడం
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
        } catch (err) {
            status.innerText = "కెమెరా ఆన్ కాలేదు. దయచేసి పర్మిషన్ ఇవ్వండి.";
        }
    }

    // 2. ఫోటో తీసి AI ని అడగడం
    async function captureAndAsk() {
        status.innerText = "చూస్తున్నాను... ఒక్క నిమిషం...";
        
        // ఫోటో క్లారిటీ కోసం
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            // మోడల్ పేరును సరిచేశాను (404 Error రాదు)
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = "చిత్రంలో ఏముందో తెలుగులో క్లుప్తంగా, స్పష్టంగా వివరించు.";
            const imagePart = { inlineData: { data: base64Image, mimeType: "image/jpeg" } };

            const result = await model.generateContent([prompt, imagePart]);
            const response = await result.response;
            const text = response.text();

            status.innerText = text;
            speak(text); 
        } catch (error) {
            // ఎర్రర్ వస్తే ఇక్కడ కనిపిస్తుంది
            status.innerText = "సమస్య: " + error.message;
            console.error(error);
        }
    }

    // 3. వాయిస్ ద్వారా వినిపించడం (తెలుగు)
    function speak(text) {
        window.speechSynthesis.cancel(); // పాత వాయిస్ ఆపడానికి
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'te-IN';
        window.speechSynthesis.speak(speech);
    }

    window.onload = startCamera;
    window.captureAndAsk = captureAndAsk;
</script>

</body>
</html>

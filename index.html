<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STGV - విశ్వనేత్ర AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
    
    <style>
        :root { --gold: #FFD700; --neon: #00ffcc; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: var(--gold); font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; border-bottom: 2px solid var(--gold); background: #111; }
        .vision-box { position: relative; width: 95%; margin: 10px auto; border: 2px solid var(--neon); border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { font-size: 1rem; color: var(--neon); margin: 10px; font-weight: bold; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 85%; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
        .info-card { padding: 15px; text-align: left; background: #151515; margin: 15px; border-radius: 10px; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">విశ్వనేత్ర AI</h2>
    <p style="margin:5px 0 0 0; font-size:0.8rem; color:#888;">STGV భవిష్యవాణి - సాదు తిరుమలేష్</p>
</div>

<div id="status">AI ఇంజిన్ లోడ్ అవుతోంది...</div>

<div class="vision-box">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<button class="btn" onclick="startVision()">విజన్ ప్రారంభించండి</button>

<div class="info-card">
    <h3 style="margin:0 0 5px 0;">లక్ష్యం:</h3>
    <p style="margin:0; font-size:0.9rem; color:#ccc;">చూపు లేని వారికి అండగా ఉండటం కోసం ఈ AI వస్తువులను గుర్తించి తెలుగులో చెబుతుంది.</p>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d');
    let model;

    // 1. అతి త్వరగా లోడ్ అయ్యేలా చిన్న మోడల్ వాడటం
    async function loadModel() {
        try {
            // Lite వెర్షన్ లోడ్ చేస్తున్నాం
            model = await cocossd.load({ base: 'lite_mobilenet_v2' });
            status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది!";
        } catch (err) {
            status.innerText = "లోడింగ్ సమస్య. Refresh చేయండి.";
            console.error(err);
        }
    }
    loadModel();

    async function startVision() {
        if (!model) { alert("AI లోడ్ అవుతోంది, ఒక క్షణం ఆగండి."); return; }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                detect();
            };
        } catch (err) {
            alert("కెమెరా పర్మిషన్ ఇవ్వండి!");
        }
    }

    async function detect() {
        const predictions = await model.detect(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        predictions.forEach(p => {
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 4;
            ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
            
            const name = translate(p.class);
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 20px Arial";
            ctx.fillText(name, p.bbox[0], p.bbox[1] > 20 ? p.bbox[1] - 10 : 20);

            if (!window.speechSynthesis.speaking) {
                speak("మీ ముందు " + name + " ఉంది");
            }
        });
        requestAnimationFrame(detect);
    }

    function translate(t) {
        const d = { "person": "మనిషి", "cell phone": "ఫోన్", "bottle": "బాటిల్", "chair": "కుర్చీ" };
        return d[t] || t;
    }

    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'te-IN';
        window.speechSynthesis.speak(u);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - విశ్వనేత్ర AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background-color: #0a0a0a; color: #FFD700; font-family: sans-serif; text-align: center; margin: 0; }
        .vision-container { width: 90%; margin: 20px auto; border: 2px solid #00ffcc; border-radius: 12px; overflow: hidden; position: relative; background: #000; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { padding: 10px; color: #00ffcc; font-weight: bold; }
        .btn { background: #FFD700; color: #000; border: none; padding: 15px 35px; font-size: 1.1rem; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>విశ్వనేత్ర AI - మెగా కోడ్</h2>
    <div id="status">AI ఇంజిన్ సిద్ధమవుతోంది...</div>
    <div class="vision-container">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <button class="btn" onclick="startVision()">విజన్ ప్రారంభించండి</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        let model;

        async function init() {
            try {
                // Lite మోడల్ లోడ్ చేస్తున్నాం
                model = await cocossd.load({ base: 'lite_mobilenet_v2' });
                status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది!";
            } catch (e) {
                status.innerText = "Error: మళ్ళీ ప్రయత్నించండి.";
            }
        }
        init();

        async function startVision() {
            if (!model) { alert("AI ఇంకా లోడ్ అవుతోంది..."); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                status.innerText = "విశ్వనేత్ర చూస్తోంది...";
                detect();
            } catch (err) {
                alert("కెమెరా పర్మిషన్ ఇవ్వండి!");
            }
        }

        async function detect() {
            const predictions = await model.detect(video);
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            predictions.forEach(p => {
                ctx.strokeStyle = "#00ffcc";
                ctx.lineWidth = 4;
                ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
                
                // వాయిస్ ఫీడ్‌బ్యాక్
                if (!window.speechSynthesis.speaking) {
                    const utter = new SpeechSynthesisUtterance("మీ ముందు " + p.class + " ఉంది");
                    utter.lang = 'te-IN';
                    window.speechSynthesis.speak(utter);
                }
            });
            requestAnimationFrame(detect);
        }
    </script>
</body>
</html>

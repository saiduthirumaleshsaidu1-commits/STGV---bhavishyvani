<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-T-G-V | విశ్వనేత్ర AI</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; border: 4px solid #00e5ff; border-radius: 20px; overflow: hidden; }
        video { width: 100%; display: block; }
        canvas { display: none; } 
        .ai-panel { background: #111; padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 5px solid #00e5ff; text-align: left; min-height: 60px; }
        .controls { display: flex; justify-content: center; gap: 25px; margin-top: 20px; }
        .btn { padding: 20px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; box-shadow: 0 0 15px #00e5ff; }
        .mic-btn { background: #00e5ff; color: #000; }
        .view-btn { background: #fff; color: #000; }
    </style>
</head>
<body onload="checkKey()">

    <h1>విశ్వనేత్ర AI 🧠</h1>
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="snapshot"></canvas>
    </div>

    <div class="ai-panel">
        <div id="ai-response">గురు, నన్ను ఏదైనా అడగండి...</div>
    </div>

    <div class="controls">
        <button class="btn view-btn" onclick="captureAndAI('ముందు ఏముందో తెలుగులో వివరించు')">👁️</button>
        <button class="btn mic-btn" onclick="startVoiceChat()">🎤</button>
    </div>

    <script>
        let API_KEY = localStorage.getItem("vishwa_key");
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('snapshot');
        const responseDiv = document.getElementById('ai-response');

        function checkKey() {
            if (!API_KEY) {
                API_KEY = prompt("గురు, మీ Gemini API Key ని ఇక్కడ పేస్ట్ చేయండి:");
                if (API_KEY) localStorage.setItem("vishwa_key", API_KEY);
            }
            startCamera();
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            speak("విశ్వనేత్ర సిద్ధం గురు.");
        }

        // 👁️ చూసి వివరించే మెదడు
        async function captureAndAI(promptText) {
            responseDiv.innerText = "చూస్తున్నాను గురు, ఒక్క నిమిషం...";
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }, { inline_data: { mime_type: "image/jpeg", data: base64Image } }] }]
            };

            try {
                const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                responseDiv.innerText = aiText;
                speak(aiText);
            } catch (e) {
                responseDiv.innerText = "క్షమించు గురు, ఇంటర్నెట్ లేదా కీ సమస్య ఉన్నట్లుంది.";
            }
        }

        // 🎤 విని సమాధానం చెప్పే మెదడు
        function startVoiceChat() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'te-IN';
            recognition.start();
            responseDiv.innerText = "వింటున్నాను గురు...";

            recognition.onresult = (event) => {
                const query = event.results[0][0].transcript;
                responseDiv.innerText = "మీరు అడిగింది: " + query;
                captureAndAI(query + " - దీనికి సమాధానం ఈ చిత్రాన్ని చూసి తెలుగులో ఇవ్వు.");
            };
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'te-IN';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>

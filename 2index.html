<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - విశ్వనేత్ర AI</title>
    <script src="https://unpkg.com/@tensorflow/tfjs@3.18.0"></script>
    <script src="https://unpkg.com/@tensorflow-models/coco-ssd@2.2.2"></script>
    
    <style>
        body { background-color: #0a0a0a; color: #FFD700; font-family: sans-serif; text-align: center; margin: 0; }
        .vision-box { width: 90%; margin: 20px auto; border: 2px solid #00ffcc; border-radius: 10px; position: relative; aspect-ratio: 4/3; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status { padding: 15px; color: #00ffcc; font-weight: bold; min-height: 20px; }
        .btn { background: #FFD700; color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; width: 80%; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h2>విశ్వనేత్ర AI - మెగా కోడ్</h2>
    <div id="status">సిస్టమ్ సిద్ధంగా ఉంది. ప్రారంభించండి...</div>

    <div class="vision-box">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
    </div>

    <button class="btn" onclick="startMegaProject()">విజన్ ప్రారంభించండి</button>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        let model;

        // 1. AI మోడల్ లోడ్ చేయడం (Optimized for speed)
        async function loadModel() {
            try {
                status.innerText = "AI ని యాక్టివేట్ చేస్తున్నాను... (10 సెకన్లు ఆగండి)";
                // 'lite' వెర్షన్ లోడ్ చేస్తున్నాం (ఇది త్వరగా లోడ్ అవుతుంది)
                model = await cocossd.load({ base: 'lite_mobilenet_v2' }); 
                status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది! బటన్ నొక్కండి.";
                status.style.color = "#FFD700";
            } catch (e) {
                status.innerText = "Error: నెట్‌వర్క్ స్లోగా ఉంది. పేజీని రీఫ్రెష్ చేయండి.";
                console.error(e);
            }
        }
        loadModel();

        // 2. కెమెరా ప్రారంభించడం
        async function startMegaProject() {
            if (!model) {
                alert("AI మోడల్ ఇంకా లోడ్ అవుతోంది, దయచేసి ఆగండి.");
                return;
            }
            
            try {
                status.innerText = "కెమెరా అనుమతి కోరుతున్నాను...";
                // కెమెరా ఫ్రంట్ వస్తుందో, బ్యాక్ వస్తుందో తెలుసుకోవడానికి { video: { facingMode: "environment" } } అని మార్చండి
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    status.innerText = "విశ్వనేత్ర చూస్తోంది...";
                    runObjectDetection();
                }
            } catch (err) {
                status.innerText = "కెమెరా పర్మిషన్ లభించలేదు.";
                alert("మీ ఫోన్ బ్రౌజర్ సెట్టింగ్స్ లో కెమెరా అనుమతి ఇవ్వండి.");
            }
        }

        // 3. ఆబ్జెక్ట్ డిటెక్షన్
        async function runObjectDetection() {
            if (!model) return;

            const predictions = await model.detect(video);
            
            // ఇక్కడ డిటెక్షన్ బాక్స్ లు గీయడం, తెలుగులో వాయిస్ ఇవ్వడం లాంటివి ఉంటాయి.
            // ... (మీ పాత కోడ్ లోని డిటెక్షన్ లాజిక్ ఇక్కడ జోడించవచ్చు)
            if (predictions.length > 0) {
                const label = predictions[0].class;
                status.innerText = "నేను చూస్తున్నాను: " + label;
                
                // వాయిస్ ఫీడ్‌బ్యాక్
                speak("మీ ముందు " + label + " ఉంది");
            }
            
            requestAnimationFrame(runObjectDetection);
        }

        // ... (వాయిస్ ఫంక్షన్స్ కోసం మీ పాత కోడ్ ఇక్కడ జోడించవచ్చు)
        function speak(text) {
            if (!window.speechSynthesis.speaking) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'te-IN';
                window.speechSynthesis.speak(utter);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV - విశ్వనేత్ర AI</title>
    <script src="https://unpkg.com/@tensorflow/tfjs"></script>
    <script src="https://unpkg.com/@tensorflow-models/coco-ssd"></script>
    
    <style>
        body { background-color: #0a0a0a; color: #FFD700; font-family: sans-serif; text-align: center; margin: 0; }
        .vision-box { width: 90%; margin: 20px auto; border: 2px solid #00ffcc; border-radius: 10px; position: relative; aspect-ratio: 4/3; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status { padding: 15px; color: #00ffcc; font-weight: bold; }
        .btn { background: #FFD700; color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>విశ్వనేత్ర AI - మెగా కోడ్</h2>
    <div id="status">సిస్టమ్ సిద్ధంగా ఉంది. ప్రారంభించండి...</div>

    <div class="vision-box">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="canvas" style="position: absolute; top: 0; left: 0;"></canvas>
    </div>

    <button class="btn" onclick="startMegaProject()">విజన్ ప్రారంభించండి</button>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        let model;

        async function startMegaProject() {
            status.innerText = "AI ఇంజిన్‌ను స్టార్ట్ చేస్తున్నాను... దయచేసి 10 సెకన్లు ఆగండి.";
            
            try {
                // కెమెరా ముందు ఓపెన్ చేస్తున్నాం
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;

                // AI మోడల్ లోడ్ చేయడం
                if (!model) {
                    model = await cocossd.load();
                }
                
                status.innerText = "విశ్వనేత్ర యాక్టివేట్ అయ్యింది!";
                detectFrame();
            } catch (err) {
                status.innerText = "తప్పు జరిగింది: " + err.message;
                console.error(err);
            }
        }

        async function detectFrame() {
            const predictions = await model.detect(video);
            // ఇక్కడ డిటెక్షన్ లాజిక్ ఉంటుంది...
            if (predictions.length > 0) {
                const label = predictions[0].class;
                status.innerText = "నేను చూస్తున్నాను: " + label;
                speak("మీ ముందు " + label + " ఉంది");
            }
            requestAnimationFrame(detectFrame);
        }

        function speak(text) {
            if (!window.speechSynthesis.speaking) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'te-IN';
                window.speechSynthesis.speak(utter);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STGV - విశ్వనేత్ర AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd/dist/coco-ssd.min.js"></script>
    
    <style>
        :root { --gold: #FFD700; --neon: #00ffcc; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: var(--gold); font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; border-bottom: 2px solid var(--gold); background: #111; }
        .vision-box { position: relative; width: 92%; margin: 15px auto; border: 2px solid var(--neon); border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { font-size: 1rem; color: var(--neon); margin: 10px; font-weight: bold; min-height: 25px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 85%; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">విశ్వనేత్ర AI</h2>
    <p style="margin:5px 0 0 0; font-size:0.8rem; color:#888;">STGV భవిష్యవాణి - సాదు తిరుమలేష్</p>
</div>

<div id="status">సిస్టమ్ చెక్ చేస్తున్నాను...</div>

<div class="vision-box">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<button class="btn" onclick="startCamera()">విజన్ ప్రారంభించండి</button>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d');
    let model;

    // 1. మోడల్ లోడ్ చేసే కొత్త పద్ధతి
    async function initAI() {
        try {
            status.innerText = "AI ఇంజిన్‌ను కనెక్ట్ చేస్తున్నాను...";
            // ఇక్కడ మనం నేరుగా ఆబ్జెక్ట్‌ను పిలుస్తున్నాం
            model = await cocoSsd.load(); 
            status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది!";
            status.style.color = "#FFD700";
        } catch (err) {
            status.innerText = "లోడింగ్ ఆగిపోయింది. దయచేసి ఇంటర్నెట్ చెక్ చేయండి.";
            console.error("AI Load Error:", err);
        }
    }

    // పేజీ ఓపెన్ అవ్వగానే AI ని పిలవడం
    window.onload = initAI;

    async function startCamera() {
        if (!model) {
            alert("AI ఇంకా లోడ్ అవుతోంది. దయచేసి ఒక నిమిషం ఆగండి.");
            return;
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                status.innerText = "విశ్వనేత్ర చూస్తోంది...";
                detect();
            };
        } catch (err) {
            alert("కెమెరా పర్మిషన్ అవసరం!");
        }
    }

    async function detect() {
        const predictions = await model.detect(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        predictions.forEach(p => {
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 4;
            ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
            
            const name = p.class; // ప్రస్తుతానికి ఇంగ్లీష్ పేరు
            ctx.fillStyle = "#00ffcc";
            ctx.font = "20px Arial";
            ctx.fillText(name, p.bbox[0], p.bbox[1] > 20 ? p.bbox[1] - 10 : 20);

            if (!window.speechSynthesis.speaking) {
                speak("I see a " + name);
            }
        });
        requestAnimationFrame(detect);
    }

    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'en-US'; // పరీక్ష కోసం ప్రస్తుతానికి ఇంగ్లీష్
        window.speechSynthesis.speak(u);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-T-G-V | విశ్వనేత్ర అల్టిమేట్</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; border: 4px solid #00e5ff; border-radius: 20px; overflow: hidden; }
        video { width: 100%; display: block; }
        .ai-panel { background: #111; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 5px solid #00e5ff; text-align: left; }
        .controls { display: flex; justify-content: center; gap: 30px; margin-top: 25px; }
        .btn { padding: 25px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; box-shadow: 0 0 20px #00e5ff; transition: 0.3s; }
        .btn:active { transform: scale(0.9); }
        .mic-btn { background: #00e5ff; color: #000; }
        .view-btn { background: #fff; color: #000; }
    </style>
</head>
<body onload="checkKey()">

    <h1>విశ్వనేత్ర అల్టిమేట్ 🧠</h1>
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="ai-panel">
        <p id="ai-response">గురు, కింది బటన్లు నొక్కి నన్ను అడగండి...</p>
    </div>

    <div class="controls">
        <button class="btn view-btn" onclick="describeScene()">👁️</button>
        <button class="btn mic-btn" onclick="startVoiceChat()">🎤</button>
    </div>

    <script>
        // ఇక్కడ ఆ సెక్యూర్ కీ లాజిక్ ఉంటుంది
        let API_KEY = localStorage.getItem("vishwa_key");
        
        function checkKey() {
            if (!API_KEY) {
                API_KEY = prompt("గురు, మీ Gemini API Key ని ఇక్కడ పేస్ట్ చేయండి:");
                if (API_KEY) localStorage.setItem("vishwa_key", API_KEY);
            }
            startCamera();
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('webcam').srcObject = stream;
        }

        async function describeScene() {
            document.getElementById('ai-response').innerText = "చూస్తున్నాను గురు...";
            // ఇక్కడ మీ AI లాజిక్ వస్తుంది (మనం ఇంతకుముందు రాసినట్లు)
            alert("కెమెరా దృశ్యం విశ్లేషించబడుతోంది..."); 
        }

        function startVoiceChat() {
            document.getElementById('ai-response').innerText = "వింటున్నాను గురు...";
            alert("మైక్ సిద్ధం! మీ ప్రశ్న అడగండి.");
        }
    </script>
</body>
</html>

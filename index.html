<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV విశ్వ నేత్ర - ఆల్ ఇన్ వన్</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root { --neon: #00ffaa; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #v-wrap { position: relative; height: 65vh; border-bottom: 3px solid var(--neon); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { height: 35vh; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #111; }
        .btn { background: #222; color: var(--neon); border: 2px solid var(--neon); border-radius: 15px; font-size: 1.2em; font-weight: bold; }
        .status-panel { position: absolute; top: 10px; width: 90%; left: 5%; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; border: 1px solid var(--neon); text-align: center; z-index: 10; }
    </style>
</head>
<body onclick="initApp()">

    <div id="v-wrap">
        <div class="status-panel" id="status">తాకి ప్రారంభించండి</div>
        <video id="cam" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button class="btn" onclick="scanText()">అక్షరాలు చదువు</button>
        <button class="btn" onclick="toggleVoice()">వాయిస్ కంట్రోల్</button>
        <button class="btn" style="grid-column: span 2;" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>

    <script>
        let model, video, synth = window.speechSynthesis, active = false;
        let recognition, isListening = false;

        async function initApp() {
            if(active) return; active = true;
            video = document.getElementById('cam');
            document.getElementById('status').innerText = "AI ఇంజిన్ లోడ్ అవుతోంది...";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                
                // 1. వస్తువులను గుర్తించే మోడల్ లోడ్ చేయడం
                model = await cocoSsd.load();
                document.getElementById('status').innerText = "విశ్వ నేత్ర సిద్ధం";
                speak("విశ్వ నేత్ర సిద్ధం. నేను పరిసరాలను గమనిస్తున్నాను.");
                
                // నిరంతర గుర్తింపు ప్రారంభం
                detectFrame();
                setupVoiceCommands();
            } catch(e) { speak("కెమెరా పర్మిషన్ ఇవ్వండి."); }
        }

        // 2. రియల్-టైమ్ వస్తువుల గుర్తింపు (మనుషులు, వస్తువులు)
        async function detectFrame() {
            if(!active) return;
            const predictions = await model.detect(video);
            
            if (predictions.length > 0) {
                let primaryObject = predictions[0];
                let name = translate(primaryObject.class);
                let distMsg = (primaryObject.bbox[2] * primaryObject.bbox[3] > 160000) ? "చాలా దగ్గరగా ఉంది." : "";
                
                document.getElementById('status').innerText = "ముందు " + name + " ఉంది " + distMsg;
                // వాయిస్ ద్వారా చెప్పడం
                speak("ముందు " + name + " ఉంది " + distMsg);
            }
            // ప్రతి 4 సెకన్లకు ఒకసారి చెక్ చేస్తుంది (యూజర్ కి ఇబ్బంది లేకుండా)
            setTimeout(detectFrame, 4000);
        }

        // 3. OCR (అక్షరాలు చదవడం)
        async function scanText() {
            speak("అక్షరాలను గుర్తిస్తున్నాను. ఫోన్ కదపకండి.");
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth * 1.5;
            canvas.height = video.videoHeight * 1.5;
            const ctx = canvas.getContext('2d');
            ctx.filter = 'contrast(1.5) grayscale(100%)';
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                const result = await Tesseract.recognize(canvas.toDataURL(), 'eng+tel');
                speak("ఇందులో ఇలా ఉంది: " + result.data.text);
            } catch (e) { speak("మళ్ళీ ప్రయత్నించండి."); }
        }

        // 4. వాయిస్ కమాండ్స్
        function setupVoiceCommands() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.lang = 'te-IN';
                recognition.onresult = (e) => {
                    let cmd = e.results[e.results.length-1][0].transcript.toLowerCase();
                    if(cmd.includes("చదువు")) scanText();
                };
            }
        }

        function toggleVoice() {
            if(!isListening) { recognition.start(); isListening = true; speak("వాయిస్ కంట్రోల్ ఆన్."); }
            else { recognition.stop(); isListening = false; speak("వాయిస్ కంట్రోల్ ఆఫ్."); }
        }

        function translate(n) {
            const dict = { 
                'person': 'మనిషి', 
                'chair': 'కుర్చీ', 
                'bottle': 'బాటిల్ లేదా సిరప్', 
                'cell phone': 'ఫోన్',
                'cup': 'కప్పు',
                'bed': 'మంచం',
                'tv': 'టీవీ'
            };
            return dict[n] || n;
        }

        function speak(t) {
            synth.cancel();
            let u = new SpeechSynthesisUtterance(t);
            u.lang = 'te-IN'; u.rate = 0.9;
            synth.speak(u);
        }
    </script>
</body>
</html>

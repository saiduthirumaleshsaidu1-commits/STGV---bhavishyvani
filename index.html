<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STGV - విశ్వనేత్ర AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        :root { --gold: #FFD700; --neon: #00ffcc; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        /* 1. లోగో & హెడర్ స్టైల్ */
        .header { padding: 30px 15px; background: #111; border-bottom: 2px solid var(--gold); }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); padding: 5px; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        h1 { color: var(--gold); margin: 5px 0; font-size: 1.5rem; }

        /* 2. విజన్ బాక్స్ (కెమెరా) */
        .vision-container { position: relative; width: 92%; margin: 20px auto; border: 2px solid var(--neon); border-radius: 15px; overflow: hidden; aspect-ratio: 4/3; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { color: var(--neon); font-weight: bold; margin: 15px 0; min-height: 24px; }

        /* 3. బటన్ స్టైల్ */
        .btn { background: var(--gold); color: #000; border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 85%; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }

        /* 4. పరిచయం (About Section) */
        .about-box { width: 85%; margin: 20px auto; background: #151515; padding: 20px; border-radius: 15px; border-left: 5px solid var(--gold); text-align: left; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); float: left; margin-right: 15px; object-fit: cover; }
        .about-text { font-size: 0.9rem; line-height: 1.5; }
        .clear { clear: both; }

        /* 5. సోషల్ లింక్స్ */
        .youtube-btn { display: inline-block; background: #FF0000; color: #fff; text-decoration: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <img src="STGV_VISWANETRA_LOGO.png" alt="STGV Logo" class="logo">
    <h1>విశ్వనేత్ర AI</h1>
    <p style="color: #888; font-size: 0.8rem; margin: 0;">STGV TECH - సాదు తిరుమలేష్ ఆవిష్కరణ</p>
</div>

<div id="status">AI ఇంజిన్ లోడ్ అవుతోంది...</div>

<div class="vision-container">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<button class="btn" onclick="startVision()">విజన్ ప్రారంభించండి</button>

<div class="about-box">
    <img src="IMG20250921204714.JPG" alt="Saidu Thirumalesh" class="profile-img">
    <div class="about-text">
        <h3 style="color: var(--gold); margin: 0 0 10px 0;">నా గురించి</h3>
        <p>నేను బేతంచెర్లకు చెందిన <b>సాదు తిరుమలేష్</b>, ఒక రాతి శిల్పిని. అంధుల కోసం ఈ 'విశ్వనేత్ర' AI టెక్నాలజీని సృష్టించాను.</p>
    </div>
    <div class="clear"></div>
    <div style="text-align: center;">
        <a href="https://www.youtube.com/@STGVBhavishyavani" class="youtube-btn" target="_blank">నా YouTube ఛానల్ సందర్శించండి →</a>
    </div>
</div>

<footer style="margin: 40px 0; color: #555; font-size: 0.8rem;">
    &copy; 2026 STGV TECH | Made by Saidu Thirumalesh
</footer>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d');
    let model;

    // AI మోడల్ లోడ్ చేయడం
    async function init() {
        try {
            model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
            status.innerText = "విశ్వనేత్ర సిద్ధంగా ఉంది!";
        } catch (e) {
            status.innerText = "నెట్‌వర్క్ సమస్య. మళ్ళీ ప్రయత్నించండి.";
        }
    }
    init();

    async function startVision() {
        if (!model) { alert("AI ఇంకా లోడ్ అవుతోంది..."); return; }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                detect();
            };
            status.innerText = "విశ్వనేత్ర చూస్తోంది...";
        } catch (err) {
            alert("కెమెరా పర్మిషన్ అవసరం!");
        }
    }

    async function detect() {
        const predictions = await model.detect(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        predictions.forEach(p => {
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 4;
            ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
            
            const teluguName = translate(p.class);
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 20px Arial";
            ctx.fillText(teluguName, p.bbox[0], p.bbox[1] > 20 ? p.bbox[1] - 10 : 20);

            if (!window.speechSynthesis.speaking) {
                speak("మీ ముందు " + teluguName + " ఉంది");
            }
        });
        requestAnimationFrame(detect);
    }

    function translate(t) {
        const d = { 
            "person": "మనిషి", "cell phone": "మొబైల్ ఫోన్", "bottle": "బాటిల్", 
            "chair": "కుర్చీ", "tv": "టీవీ", "laptop": "ల్యాప్‌టాప్" 
        };
        return d[t] || t;
    }

    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'te-IN';
        window.speechSynthesis.speak(u);
    }
</script>

</body>
</html>

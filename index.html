<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-T-G-V | విశ్వనేత్ర AI</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; border: 4px solid #00e5ff; border-radius: 20px; overflow: hidden; box-shadow: 0 0 25px #00e5ff; }
        video { width: 100%; display: block; }
        canvas { display: none; }
        .ai-panel { background: #111; padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 6px solid #00e5ff; text-align: left; min-height: 80px; font-size: 18px; color: #fff; }
        .controls { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .btn { padding: 25px; border-radius: 50%; border: none; font-size: 35px; cursor: pointer; box-shadow: 0 0 15px #00e5ff; transition: 0.3s; }
        .btn:active { transform: scale(0.9); }
        .mic-btn { background: #00e5ff; color: #000; }
        .view-btn { background: #fff; color: #000; }
    </style>
</head>
<body onload="initApp()">

    <h1>విశ్వనేత్ర AI 🧠</h1>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="snapshot"></canvas>
    </div>

    <div class="ai-panel">
        <div id="ai-response">సిస్టమ్ సిద్ధంగా ఉంది గురు. కన్ను బటన్ నొక్కండి...</div>
    </div>

    <div class="controls">
        <button class="btn view-btn" title="వివరించు" onclick="analyzeFrame('ముందు ఏముందో తెలుగులో వివరంగా వివరించు. అంధులకు దారి చూపిస్తున్నట్లు మాట్లాడు.')">👁️</button>
        <button class="btn mic-btn" title="ప్రశ్న అడుగు" onclick="startListening()">🎤</button>
    </div>

    <script>
        // బ్రౌజర్ మెమరీ నుండి API Key తీసుకోవడం
        let API_KEY = localStorage.getItem("vishwa_key");
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('snapshot');
        const responseDiv = document.getElementById('ai-response');

        async function initApp() {
            if (!API_KEY) {
                API_KEY = prompt("గురు, మీ Gemini API Key ఇంకా సేవ్ అవ్వలేదు. ఇక్కడ పేస్ట్ చేయండి:");
                if (API_KEY) localStorage.setItem("vishwa_key", API_KEY);
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                speak("విశ్వనేత్ర సిద్ధం గురు. కీ లోడ్ అయింది.");
            } catch (err) {
                responseDiv.innerText = "కెమెరా పర్మిషన్ ఇవ్వండి బాస్!";
            }
        }

        // 👁️ కెమెరా చూసి వివరించడం
        async function analyzeFrame(promptText) {
            responseDiv.innerText = "చూస్తున్నాను గురు, ఒక్క నిమిషం...";
            window.speechSynthesis.cancel();

            // ఫోటో క్యాప్చర్
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            // Gemini API Call - మీ కీని ఇక్కడ వాడుకుంటుంది
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                responseDiv.innerText = aiResponse;
                speak(aiResponse);
            } catch (error) {
                responseDiv.innerText = "కీ లేదా ఇంటర్నెట్ సమస్య ఉంది గురు.";
                console.error(error);
            }
        }

        // 🎤 మాట విని సమాధానం చెప్పడం
        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'te-IN';
            recognition.start();

            responseDiv.innerText = "వింటున్నాను గురు, అడగండి...";

            recognition.onresult = (event) => {
                const userQuery = event.results[0][0].transcript;
                responseDiv.innerText = "మీ ప్రశ్న: " + userQuery;
                analyzeFrame(userQuery + " - ఈ దృశ్యం చూసి తెలుగులో సమాధానం ఇవ్వు.");
            };
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'te-IN';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>

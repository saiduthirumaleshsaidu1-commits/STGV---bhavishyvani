<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STGV విశ్వ నేత్ర Pro - Smart Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --neon: #00ffcc; --danger: #ff4500; --bg: #000a12; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #cam-wrap { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.2; pointer-events: none; }
        .hud { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .status-box { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 25px; border: 2px solid var(--neon); display: inline-block; width: 85%; }
        .start-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .start-btn { padding: 25px 50px; background: var(--neon); border: none; border-radius: 50px; font-size: 1.5em; font-weight: bold; color: #000; box-shadow: 0 0 30px var(--neon); }
    </style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h2 style="color:var(--neon);">STGV విశ్వ నేత్ర</h2>
        <button class="start-btn" onclick="startVision()">ప్రారంభించు</button>
    </div>

    <div id="cam-wrap">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div class="hud">
            <div class="status-box">
                <div id="nav-info" style="font-size: 1.3em;">దారిని విశ్లేషిస్తున్నాను...</div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const navInfo = document.getElementById('nav-info');
        const synth = window.speechSynthesis;
        
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lastAlertTime = 0;

        function playSoftBeep() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 330; 
            gain.gain.value = 0.05;
            osc.start();
            setTimeout(() => osc.stop(), 100);
        }

        function speak(text) {
            if (Date.now() - lastAlertTime < 4000) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'te-IN';
            u.rate = 1.0;
            synth.speak(u);
            lastAlertTime = Date.now();
        }

        async function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.segmentationMask, 0, 0, canvasElement.width, canvasElement.height);

            const data = canvasCtx.getImageData(0, 0, canvasElement.width, canvasElement.height).data;
            let obstaclePixels = 0;

            // కేవలం ముందు ఉన్న దారిలో (Bottom 60% area) అడ్డంకులను చూడటం
            for (let i = data.length / 2; i < data.length; i += 60) {
                if (data[i] > 120) obstaclePixels++;
            }

            if (obstaclePixels > 400) { 
                // అడ్డంకి చాలా దగ్గరగా ఉంటేనే వైబ్రేషన్
                if (obstaclePixels > 800) {
                    if (navigator.vibrate) navigator.vibrate(100);
                    playSoftBeep();
                    navInfo.style.color = "#ff4500";
                    navInfo.innerText = "ఆగండి! చాలా దగ్గరగా అడ్డంకి ఉంది";
                    speak("జాగ్రత్త, ముందు అడ్డంకి ఉంది");
                } else {
                    navInfo.style.color = "#ffcc00";
                    navInfo.innerText = "ముందు ఏదో ఉంది, నెమ్మదిగా వెళ్ళండి";
                }
            } else {
                navInfo.style.color = "#00ffcc";
                navInfo.innerText = "దారి బాగుంది, సాగండి";
            }
            canvasCtx.restore();
        }

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
        }});

        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onResults);

        function startVision() {
            document.getElementById('start-screen').style.display = 'none';
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // ఖచ్చితంగా వెనుక కెమెరాను మాత్రమే అడగడం
            const constraints = {
                video: { facingMode: { exact: "environment" } }
            };

            navigator.mediaDevices.getUserMedia(constraints)
            .then((stream) => {
                videoElement.srcObject = stream;
                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await selfieSegmentation.send({image: videoElement});
                    },
                    width: 640,
                    height: 480
                });
                camera.start();
                speak("విశ్వ నేత్ర ప్రారంభమైంది. వెనుక కెమెరా ఆన్ చేయబడింది.");
            })
            .catch((err) => {
                // ఒకవేళ exact environment పనిచేయకపోతే సాధారణ కెమెరా
                console.error("Back camera error: ", err);
                alert("వెనుక కెమెరా దొరకలేదు, దయచేసి పర్మిషన్స్ చెక్ చేయండి.");
            });
        }
    </script>
</body>
</html>

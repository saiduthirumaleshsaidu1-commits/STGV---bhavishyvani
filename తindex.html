<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>విశ్వనేత్ర AI - Updated</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: white; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; border: 2px solid #00d2ff; padding: 15px; border-radius: 20px; background: #161616; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        h1 { color: #00d2ff; font-size: 22px; margin-bottom: 5px; }
        p { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        video { width: 100%; border-radius: 15px; border: 2px solid #333; background: black; }
        .controls { display: flex; gap: 10px; margin-top: 15px; flex-direction: column; }
        button { color: white; border: none; padding: 14px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-basic { background: #333; border: 1px solid #555; }
        .btn-ai { background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); }
        #status { margin-top: 15px; font-size: 18px; color: #00ff88; min-height: 60px; padding: 10px; border-top: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        canvas { display: none; }
        .loading-text { color: #ff9800; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>విశ్వనేత్ర AI</h1>
    <p>సాంకేతికతతో సామాన్యుడి కన్ను</p>
    
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div id="status" class="loading-text">సిస్టమ్ సిద్ధం అవుతోంది... దయచేసి వేచి ఉండండి.</div>

    <div class="controls">
        <button class="btn-basic" onclick="runMobileNet()">త్వరిత గుర్తింపు (Basic Mode)</button>
        
        <button class="btn-ai" onclick="runGeminiAI()">అడ్వాన్స్‌డ్ విశ్లేషణ (Gemini AI)</button>
    </div>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // --- మీ API Key ఇక్కడ ఉంది ---
    const p1 = "AIzaSy"; 
    const p2 = "A0NDNLOjOLc8S_mTrNIFmgF75CDl9dAD8"; 
    const API_KEY = (p1 + p2).trim(); 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    let netModel = null;

    // 1. కెమెరా మరియు మోడల్స్ ప్రారంభించడం
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            // MobileNet లోడ్ చేయడం (1000+ objects)
            netModel = await mobilenet.load();
            
            status.innerText = "నేను సిద్ధం, గురువు గారు! ఏదైనా వస్తువును చూపండి.";
            status.classList.remove("loading-text");
        } catch (err) {
            status.innerText = "కెమెరా పర్మిషన్ ఇవ్వండి లేదా ఇంటర్నెట్ చెక్ చేయండి.";
            console.error(err);
        }
    }

    // 2. బేసిక్ మోడ్ (MobileNet - 1000 Objects)
    window.runMobileNet = async function() {
        if (!netModel) {
            status.innerText = "మోడల్ ఇంకా లోడ్ కాలేదు...";
            return;
        }
        status.innerText = "చూస్తున్నాను...";
        
        const predictions = await netModel.classify(video);
        if (predictions.length > 0) {
            const topResult = predictions[0].className;
            status.innerText = "బహుశా ఇది: " + topResult;
            speak("ఇది బహుశా " + topResult);
        }
    };

    // 3. అడ్వాన్స్‌డ్ మోడ్ (Gemini AI - నెట్ ఆప్టిమైజేషన్ తో)
    window.runGeminiAI = async function() {
        status.innerText = "AI తో విశ్లేషిస్తున్నాను... (Wait)";
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        // నెట్ స్లోగా ఉన్నవారి కోసం క్వాలిటీ 0.05 కి తగ్గించాను (Extreme Compression)
        const base64Image = canvas.toDataURL('image/jpeg', 0.05).split(',')[1];

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = "ఈ చిత్రంలో ఏముందో తెలుగులో క్లుప్తంగా వివరించు.";
            const imagePart = { inlineData: { data: base64Image, mimeType: "image/jpeg" } };

            const result = await model.generateContent([prompt, imagePart]);
            const response = await result.response;
            const text = response.text();

            status.innerText = text;
            speak(text);
        } catch (error) {
            console.error(error);
            status.innerText = "నెట్‌వర్క్ స్లోగా ఉంది లేదా API Key సమస్య. బేసిక్ మోడ్ వాడండి.";
        }
    };

    // వాయిస్ ఫంక్షన్
    function speak(text) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'te-IN'; // తెలుగు వాయిస్ ప్రయత్నం
        window.speechSynthesis.speak(speech);
    }

    window.onload = init;
</script>

</body>
</html>

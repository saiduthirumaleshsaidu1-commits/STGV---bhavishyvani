<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-T-G-V | విశ్వనేత్ర 3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #000; color: #0ff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; border: 4px solid #0ff; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px #0ff; }
        video { width: 100%; display: block; }
        .ai-status { background: #111; padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #333; min-height: 100px; }
        .mic-btn { background: #0ff; color: #000; padding: 25px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; margin-top: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(0, 255, 255, 0); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initAI()">

    <h1>విశ్వనేత్ర 3.0 - సంభాషణా సహాయకి</h1>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="ai-status">
        <p id="ai-thought">నేను వింటున్నాను గురు... అడగండి.</p>
        <h3 id="ai-speech">"మీకు ఎలా సహాయపడగలను?"</h3>
    </div>

    <button class="mic-btn" onclick="startListening()">🎤</button>

    <script>
        let model;
        const video = document.getElementById('webcam');
        const thought = document.getElementById('ai-thought');
        const speech = document.getElementById('ai-speech');

        // వాయిస్ అవుట్ పుట్ (తెలుగు)
        function speak(text) {
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'te-IN';
            utterance.pitch = 1.1;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
            speech.innerText = `"${text}"`;
        }

        async function initAI() {
            speak("విశ్వనేత్ర 3.0 సిద్ధంగా ఉంది గురు. నేను మీతో మాట్లాడగలను, దారి చూపగలను.");
            model = await cocoSsd.load();
            startCamera();
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        }

        // వాయిస్ రికగ్నిషన్ (మనం మాట్లాడేది వినడానికి)
        function startListening() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'te-IN';
            recognition.start();

            thought.innerText = "మీ మాటలను వింటున్నాను...";

            recognition.onresult = async (event) => {
                const command = event.results[0][0].transcript;
                thought.innerText = `మీరు అన్నది: "${command}"`;
                processCommand(command);
            };
        }

        async function processCommand(cmd) {
            const predictions = await model.detect(video);
            
            if (cmd.includes("ఏముంది") || cmd.includes("చూడు")) {
                if (predictions.length > 0) {
                    let item = translate(predictions[0].class);
                    speak(`నీ ముందు ఒక ${item} ఉంది గురు.`);
                } else {
                    speak("ప్రస్తుతానికి ఏమీ కనిపించడం లేదు.");
                }
            } else if (cmd.includes("దారి") || cmd.includes("వెళ్లాలి")) {
                speak("ముందు దారి ఖాళీగా ఉంది, నెమ్మదిగా నడవండి.");
            } else {
                speak("క్షమించు గురు, అది నాకు అర్థం కాలేదు. ఇంకోసారి చెబుతారా?");
            }
        }

        function translate(label) {
            const dict = { "person": "మనిషి", "mobile phone": "ఫోన్", "chair": "కుర్చీ", "bottle": "నీళ్ల సీసా", "dog": "కుక్క", "motorcycle": "మోటార్ సైకిల్" };
            return dict[label] || label;
        }
    </script>
</body>
</html>
